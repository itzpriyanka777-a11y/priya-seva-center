<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File a Complaint | Priya Seva</title>
  <meta name="theme-color" content="#030814">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* SCROLLBAR NUKE - Hides scrollbars on all browsers but keeps scrolling active */
    ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
    * { scrollbar-width: none !important; -ms-overflow-style: none !important; }

    :root { --void-bg: #030814; --glass-base: rgba(10, 15, 25, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --highlight: #f39c12; }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* THE SCORCHED-EARTH GOOGLE TRANSLATE NUKE */
    html { top: 0px !important; margin-top: 0px !important; padding-top: 0px !important; }
    body { top: 0px !important; margin-top: 0px !important; position: static !important; }
    .skiptranslate, iframe.goog-te-banner-frame, .VIpgJd-Zvi9od-aZ2wEe-wOHMyf, .VIpgJd-Zvi9od-ORHb-OEVmcd, #goog-gt-tt, .goog-te-balloon-frame { display: none !important; width: 0 !important; height: 0 !important; visibility: hidden !important; }
    .goog-text-highlight { background: none !important; box-shadow: none !important; border: none !important;}

    /* ANTI-FLASH FADE */
    body { 
      opacity: 0; 
      animation: smoothLoad 0.8s ease-in 0.6s forwards; 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--void-bg); 
      overflow: hidden; 
      color: white; 
    }
    @keyframes smoothLoad { to { opacity: 1; } }

    #nightCanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
    
    /* UNIVERSAL OPAQUE NAVBAR MODULE */
    .universal-header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10000; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5, 5, 16, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-sizing: border-box;}
    .universal-brand { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2); transition: 0.3s;}
    .universal-brand:hover { transform: scale(1.05); color: #f39c12; }
    .universal-nav-right { display: flex; gap: 15px; align-items: center;}
    .universal-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Poppins'; font-weight: 600; font-size: 13px; transition: 0.3s; text-decoration: none; display: flex; align-items: center; gap: 8px;}
    .universal-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
    .btn-dash { border-color: rgba(243, 156, 18, 0.3); color: #f39c12; }
    .btn-dash:hover { background: rgba(243, 156, 18, 0.1); box-shadow: 0 5px 15px rgba(243, 156, 18, 0.2);}

    /* LANGUAGE DROPDOWN CSS */
    .menu-container { position: relative; display: inline-block; }
    .menu-btn { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 15px; font-size: 16px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; backdrop-filter: blur(10px);}
    .menu-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: white;}
    .dropdown-content { display: none; position: absolute; right: 0; top: 110%; background: rgba(5, 10, 20, 0.95); backdrop-filter: blur(20px); min-width: 150px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid var(--glass-border); overflow: hidden; z-index: 99;}
    .dropdown-content a { color: #e2e8f0; padding: 16px 22px; display: block; font-weight: 500; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; text-decoration: none;}
    .dropdown-content a:hover { background: rgba(243, 156, 18, 0.1); color: white; padding-left: 28px;}
    .menu-container:hover .dropdown-content { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
       .universal-header { padding: 15px 20px; }
       .universal-brand span { display: none; }
       .universal-btn { padding: 8px 12px; font-size: 12px; }
       .universal-btn span { display: none; }
    }

    .split-layout { display: flex; height: 100vh; width: 100vw; position: relative; z-index: 10; }
    .left-pane { flex: 1.15; position: relative; display: flex; align-items: center; justify-content: center; padding: 100px 40px 20px 40px; box-sizing: border-box; overflow-y: auto; overflow-x: hidden;}
    .left-pane::-webkit-scrollbar { width: 0px; }
    .form-container { position: relative; width: 100%; max-width: 500px;}
    
    .spatial-header { text-align: center; margin-bottom: 40px; }
    .spatial-header h2 { margin: 0 0 10px 0; font-size: 38px; font-weight: 700; color: #fff; letter-spacing: 1px;}
    .spatial-header p { margin: 0 auto; font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6;}

    .capsule-group { width: 100%; margin-bottom: 25px; position: relative;}
    
    .light-tracker { position: relative; width: 100%; }
    .light-tracker::after { content: ''; position: absolute; inset: 0px; border-radius: inherit; padding: 1.5px; background: radial-gradient(circle 120px at var(--mouse-x, -500px) var(--mouse-y, -500px), var(--highlight), transparent 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; pointer-events: none; z-index: 10; }
    .light-tracker::before { content: ''; position: absolute; inset: 0; border-radius: inherit; background: radial-gradient(circle 180px at var(--mouse-x, -500px) var(--mouse-y, -500px), rgba(243, 156, 18, 0.08), transparent 100%); pointer-events: none; z-index: 0; }

    .input-group label { display: block; font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px;}
    .glass-render { width: 100%; padding: 18px 25px; background: var(--glass-base); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; color: #ffffff; font-family: 'Poppins'; font-size: 14px; font-weight: 500; box-sizing: border-box; transition: 0.4s; outline: none; position: relative; z-index: 1; }
    .glass-render:focus { transform: scale(1.02); background: rgba(243, 156, 18, 0.1); border-color: var(--highlight); }
    
    /* Make date pickers look good in dark mode */
    input[type="date"].glass-render { color-scheme: dark; cursor: pointer; }
    
    /* Checkbox Styling */
    .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; background: var(--glass-base); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);}
    .checkbox-label { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #fff; cursor: pointer; font-weight: 500;}
    .checkbox-label input { width: 18px; height: 18px; accent-color: var(--highlight); cursor: pointer; }

    textarea.glass-render { resize: vertical; min-height: 120px; border-radius: 20px;}
    .char-counter { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 5px; display: block; }

    .submit-btn { width: 100%; padding: 22px; background: rgba(243, 156, 18, 0.1); border: 1px solid var(--highlight); border-radius: 50px; color: var(--highlight); font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; position: relative; z-index: 1;}
    .submit-btn:hover { background: var(--highlight); color: #000; box-shadow: 0 10px 30px rgba(243, 156, 18, 0.3); }

    .right-pane { flex: 0.85; position: relative; background: transparent; overflow: hidden; pointer-events: none; -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 45%); }
    .video-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translateX(-50%) translateY(-50%); object-fit: cover; z-index: 1; opacity: 0.3; filter: grayscale(100%);}

    @media (max-width: 900px) {
      body { overflow: auto; }
      .split-layout { flex-direction: column; height: auto; display: block;}
      .left-pane { padding: 100px 20px 40px 20px; display: block;}
      .right-pane { display: none !important; } 
    }
  </style>
</head>
<body>

  <div id="google_translate_element" style="display:none; width:0; height:0; position:absolute;"></div>

  <header class="universal-header">
    <a href="index.html" class="universal-brand">
      <i class="fa-solid fa-triangle-exclamation" style="color: #f39c12;"></i> <span>Priya Seva Center</span>
    </a>
    <div class="universal-nav-right">
      <a href="index.html" class="universal-btn"><i class="fa-solid fa-house"></i> <span>Home</span></a>
      <a href="dashboard.html" class="universal-btn btn-dash"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a>
      
      <div class="menu-container">
        <button class="menu-btn" title="Change Language"><i class="fa-solid fa-globe"></i></button>
        <div class="dropdown-content">
          <a href="#" onclick="changeLanguage('en'); return false;">English</a>
          <a href="#" onclick="changeLanguage('hi'); return false;">हिन्दी (Hindi)</a>
          <a href="#" onclick="changeLanguage('bn'); return false;">বাংলা (Bengali)</a>
        </div>
      </div>
    </div>
  </header>

  <canvas id="nightCanvas"></canvas>
  <div id="rippleContainer"></div>

  <div class="split-layout">
    <div class="left-pane">
      <div class="form-container">
        
        <div class="spatial-header">
          <h2>File a Complaint</h2>
          <p>We want everything to be perfect. Tell us what happened so our managers can fix it immediately.</p>
        </div>

        <div class="capsule-group input-group">
          <label>Your Full Name</label>
          <div class="light-tracker" style="border-radius: 25px;">
            <input type="text" id="clientName" class="glass-render" placeholder="Your registered name" required>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Date of Problem</label>
          <div class="light-tracker" style="border-radius: 25px;">
            <input type="date" id="incidentDate" class="glass-render" onclick="this.showPicker ? this.showPicker() : null">
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Which Service? (Select all that apply)</label>
          <div class="light-tracker" style="border-radius: 20px;">
            <div class="checkbox-group">
              <label class="checkbox-label"><input type="checkbox" value="Maid Services" class="service-check"> Maid</label>
              <label class="checkbox-label"><input type="checkbox" value="Certified Nurses" class="service-check"> Expert Nurse</label>
              <label class="checkbox-label"><input type="checkbox" value="Health Visits" class="service-check"> Health Check-Up</label>
              <label class="checkbox-label"><input type="checkbox" value="Babysitters" class="service-check"> Babysitter</label>
            </div>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Tell us what happened</label>
          <div class="light-tracker" style="border-radius: 20px;">
            <textarea id="complaintText" class="glass-render" maxlength="500" placeholder="Please type the details here (max 500 characters)..." oninput="updateCounter()"></textarea>
            <span class="char-counter" id="charCount">0 / 500</span>
          </div>
        </div>

        <div class="capsule-group" style="margin-top: 35px;">
          <div class="light-tracker" style="border-radius: 50px;">
            <button onclick="submitGrievance()" class="submit-btn" id="submitBtn">Send Complaint</button>
          </div>
        </div>

      </div>
    </div>

    <div class="right-pane">
      <img src="https://images.pexels.com/photos/5668772/pexels-photo-5668772.jpeg" class="video-bg" alt="Support">
    </div>
  </div>

  <script>
    // --- Physics & Canvas ---
    const canvas = document.getElementById('nightCanvas'); const ctx = canvas.getContext('2d'); let stars = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    for(let i=0; i<300; i++) { stars.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, size: Math.random()*1.5, speed: (Math.random()*0.1)+0.02, color: '243,156,18' }); }
    function drawSky() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(s => { s.x -= s.speed; if(s.x < 0) s.x = canvas.width; ctx.fillStyle = `rgba(${s.color}, 0.5)`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(drawSky); }
    drawSky();

    // UI LAG FIX: requestAnimationFrame throttle added to heavy mousemove event
    let isMouseTicking = false;
    document.addEventListener('mousemove', (e) => {
      if (!isMouseTicking) {
        window.requestAnimationFrame(() => {
          document.querySelectorAll('.light-tracker').forEach(el => {
            const rect = el.getBoundingClientRect(); 
            el.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`); 
            el.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
          });
          isMouseTicking = false;
        });
        isMouseTicking = true;
      }
    });

    const rippleContainer = document.getElementById('rippleContainer');
    document.addEventListener('click', (e) => {
      if(e.target.closest('button') || e.target.closest('a') || e.target.closest('.light-tracker') || e.target.closest('input') || e.target.closest('textarea')) return;
      const ripple = document.createElement('div'); ripple.className = 'water-ripple';
      ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
      rippleContainer.appendChild(ripple); setTimeout(() => ripple.remove(), 1800);
    });

    function updateCounter() {
      const field = document.getElementById('complaintText');
      document.getElementById('charCount').innerText = `${field.value.length} / 500`;
    }

    // --- Backend Processing ---
    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxE2la4J0jjNG3j8lB5DWa-hAAFhRF-1Yg4-XWFLwMY5yp-E3dN9Rplnb0g4HfPCzs/exec"; 

    async function submitGrievance() {
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('clientName').value;
      const date = document.getElementById('incidentDate').value;
      const text = document.getElementById('complaintText').value;

      // Get all checked services
      const checkboxes = document.querySelectorAll('.service-check:checked');
      let selectedServices = [];
      checkboxes.forEach((cb) => selectedServices.push(cb.value));

      if(!name || !date || !text || selectedServices.length === 0) return alert("Please fill all fields and select a service.");

      try {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...'; btn.disabled = true;
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { btn.innerHTML = 'Send Complaint'; btn.disabled = false; return alert("Please log in first."); }

        const payload = {
          actionType: 'file_grievance',
          name: name,
          email: user.email,
          services: selectedServices.join(", "),
          date: date,
          details: text
        };

        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

        alert("Complaint sent. We will look into this right away.");
        window.location.href = "dashboard.html";

      } catch(err) { alert("Error connecting to server."); btn.innerHTML = 'Send Complaint'; btn.disabled = false; }
    }
  </script>

  <!-- THE MASTER LANGUAGE ENGINE (Fix 1) -->
  <script type="text/javascript">
    // 1. Force the language immediately to stop the choppy English flash
    let savedLang = localStorage.getItem('priyaSevaLang') || 'bn';
    document.cookie = `googtrans=/en/${savedLang}; path=/; domain=${window.location.hostname}`;
    document.cookie = `googtrans=/en/${savedLang}; path=/`;

    // 2. Initialize Google Translate Invisibly
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'en,hi,bn', autoDisplay: false }, 'google_translate_element');
    }

    // 3. The Global Switcher (Fixes the stuck Main Page!)
    function changeLanguage(langCode) {
      localStorage.setItem('priyaSevaLang', langCode); // Saves to Global Memory
      localStorage.setItem('langChoiceMade', 'true');  // Tells the popup you already chose
      document.cookie = `googtrans=/en/${langCode}; path=/; domain=${window.location.hostname}`;
      document.cookie = `googtrans=/en/${langCode}; path=/`;
      window.location.reload(); // Reloads instantly in the correct language
    }

    // 4. Popup & Loading Mask Controller (For index.html)
    window.addEventListener('DOMContentLoaded', () => {
      const mask = document.getElementById('contentMask');
      const popup = document.getElementById('langPopupOverlay');
      const choiceMade = localStorage.getItem('langChoiceMade');

      if (mask && popup) {
        if (!choiceMade) {
          // First time visitor: Show mask for 1s, then show Popup
          setTimeout(() => {
            mask.style.opacity = '0';
            setTimeout(() => { mask.style.display = 'none'; popup.style.display = 'flex'; }, 800);
          }, 1000);
        } else {
          // Returning visitor: Just hide the mask smoothly
          setTimeout(() => {
            mask.style.opacity = '0';
            setTimeout(() => { mask.style.display = 'none'; }, 800);
          }, 800);
        }
      }
      
      // Nuke the ugly Google Translate Bar permanently
      const observer = new MutationObserver(() => {
          document.body.style.top = '0px';
          document.documentElement.style.top = '0px';
          const gtFrame = document.querySelector('.goog-te-banner-frame');
          if(gtFrame) gtFrame.remove();
      });
      observer.observe(document.body, { attributes: true, attributeFilter: ['style'] });
    });
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
