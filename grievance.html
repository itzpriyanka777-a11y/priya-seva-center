<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File a Grievance | Priya Seva</title>
  <meta name="theme-color" content="#030814">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root { --void-bg: #030814; --glass-base: rgba(10, 15, 25, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --highlight: #f39c12; }
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: var(--void-bg); overflow: hidden; color: white; }
    #nightCanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
    
    .navbar { position: absolute; top: 0; left: 0; width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 9999; }
    .logo-text { font-size: 26px; font-weight: 700; color: white; display: flex; align-items: center; gap: 12px; text-decoration: none; text-shadow: 0 0 15px rgba(243, 156, 18, 0.6); }
    .nav-link { color: white; text-decoration: none; font-weight: 600; font-size: 14px; background: rgba(10, 15, 25, 0.6); backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 30px; border: 1px solid var(--glass-border); transition: 0.4s;}
    .nav-link:hover { transform: translateY(-3px); background: rgba(243, 156, 18, 0.15); border-color: var(--highlight);}

    .split-layout { display: flex; height: 100vh; width: 100vw; position: relative; z-index: 10; }
    .left-pane { flex: 1.15; position: relative; display: flex; align-items: center; justify-content: center; padding: 100px 40px 20px 40px; box-sizing: border-box; overflow-y: auto; overflow-x: hidden;}
    .left-pane::-webkit-scrollbar { width: 0px; }
    .form-container { position: relative; width: 100%; max-width: 500px;}
    
    .spatial-header { text-align: center; margin-bottom: 40px; }
    .spatial-header h2 { margin: 0 0 10px 0; font-size: 38px; font-weight: 700; color: #fff; letter-spacing: 1px;}
    .spatial-header p { margin: 0 auto; font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6;}

    .capsule-group { width: 100%; margin-bottom: 25px; position: relative;}
    
    .light-tracker { position: relative; width: 100%; }
    .light-tracker::after { content: ''; position: absolute; inset: 0px; border-radius: inherit; padding: 1.5px; background: radial-gradient(circle 120px at var(--mouse-x, -500px) var(--mouse-y, -500px), var(--highlight), transparent 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; pointer-events: none; z-index: 10; }
    .light-tracker::before { content: ''; position: absolute; inset: 0; border-radius: inherit; background: radial-gradient(circle 180px at var(--mouse-x, -500px) var(--mouse-y, -500px), rgba(243, 156, 18, 0.08), transparent 100%); pointer-events: none; z-index: 0; }

    .input-group label { display: block; font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px;}
    .glass-render { width: 100%; padding: 18px 25px; background: var(--glass-base); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; color: #ffffff; font-family: 'Poppins'; font-size: 14px; font-weight: 500; box-sizing: border-box; transition: 0.4s; outline: none; position: relative; z-index: 1; }
    .glass-render:focus { transform: scale(1.02); background: rgba(243, 156, 18, 0.1); border-color: var(--highlight); }
    
    /* Checkbox Styling */
    .checkbox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; background: var(--glass-base); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);}
    .checkbox-label { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #fff; cursor: pointer; font-weight: 500;}
    .checkbox-label input { width: 18px; height: 18px; accent-color: var(--highlight); cursor: pointer; }

    textarea.glass-render { resize: vertical; min-height: 120px; border-radius: 20px;}
    .char-counter { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 5px; display: block; }

    .submit-btn { width: 100%; padding: 22px; background: rgba(243, 156, 18, 0.1); border: 1px solid var(--highlight); border-radius: 50px; color: var(--highlight); font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; position: relative; z-index: 1;}
    .submit-btn:hover { background: var(--highlight); color: #000; box-shadow: 0 10px 30px rgba(243, 156, 18, 0.3); }

    .right-pane { flex: 0.85; position: relative; background: transparent; overflow: hidden; pointer-events: none; -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 45%); }
    .video-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translateX(-50%) translateY(-50%); object-fit: cover; z-index: 1; opacity: 0.3; filter: grayscale(100%);}

    @media (max-width: 900px) {
      body { overflow: auto; }
      .navbar { position: relative !important; padding: 25px 20px !important; }
      .split-layout { flex-direction: column; height: auto; display: block;}
      .left-pane { padding: 10px 20px 40px 20px; display: block;}
      .right-pane { display: none !important; } 
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo-text"><i class="fa-solid fa-triangle-exclamation" style="color: #f39c12;"></i> Priya Seva</a>
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
  </nav>

  <canvas id="nightCanvas"></canvas>

  <div class="split-layout">
    <div class="left-pane">
      <div class="form-container">
        
        <div class="spatial-header">
          <h2>Resolution Center</h2>
          <p>We hold our personnel to the highest standards. Log your incident here for immediate review by management.</p>
        </div>

        <div class="capsule-group input-group">
          <label>Registered Name</label>
          <div class="light-tracker" style="border-radius: 25px;">
            <input type="text" id="clientName" class="glass-render" placeholder="Your registered name" required>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Date of Incident</label>
          <div class="light-tracker" style="border-radius: 25px;">
            <input type="date" id="incidentDate" class="glass-render">
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Services Involved (Select all that apply)</label>
          <div class="light-tracker" style="border-radius: 20px;">
            <div class="checkbox-group">
              <label class="checkbox-label"><input type="checkbox" value="Maid Services" class="service-check"> Maid Services</label>
              <label class="checkbox-label"><input type="checkbox" value="Certified Nurses" class="service-check"> Certified Nurses</label>
              <label class="checkbox-label"><input type="checkbox" value="Health Visits" class="service-check"> Health Visits</label>
              <label class="checkbox-label"><input type="checkbox" value="Babysitters" class="service-check"> Babysitters</label>
            </div>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Details of Incident</label>
          <div class="light-tracker" style="border-radius: 20px;">
            <textarea id="complaintText" class="glass-render" maxlength="500" placeholder="Please describe the issue in detail (max 500 characters)..." oninput="updateCounter()"></textarea>
            <span class="char-counter" id="charCount">0 / 500</span>
          </div>
        </div>

        <div class="capsule-group" style="margin-top: 35px;">
          <div class="light-tracker" style="border-radius: 50px;">
            <button onclick="submitGrievance()" class="submit-btn" id="submitBtn">Submit Report to Management</button>
          </div>
        </div>

      </div>
    </div>

    <div class="right-pane">
      <img src="https://images.pexels.com/photos/5668772/pexels-photo-5668772.jpeg" class="video-bg" alt="Support">
    </div>
  </div>

  <script>
    const canvas = document.getElementById('nightCanvas'); const ctx = canvas.getContext('2d'); let stars = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    for(let i=0; i<300; i++) { stars.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, size: Math.random()*1.5, speed: (Math.random()*0.1)+0.02, color: '243,156,18' }); }
    function drawSky() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(s => { s.x -= s.speed; if(s.x < 0) s.x = canvas.width; ctx.fillStyle = `rgba(${s.color}, 0.5)`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(drawSky); }
    drawSky();

    document.addEventListener('mousemove', (e) => {
      document.querySelectorAll('.light-tracker').forEach(el => {
        const rect = el.getBoundingClientRect(); el.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`); el.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
      });
    });

    function updateCounter() {
      const field = document.getElementById('complaintText');
      document.getElementById('charCount').innerText = `${field.value.length} / 500`;
    }

    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // PASTE YOUR SCRIPT URL HERE
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxz6tqGne1qii5oaqPqQsLSpEhW6wnqZumfhpu3YmINiFOHJ6RSPxRf07Ym9ZQ_TzE/exec"; 

    async function submitGrievance() {
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('clientName').value;
      const date = document.getElementById('incidentDate').value;
      const text = document.getElementById('complaintText').value;

      // Get all checked services
      const checkboxes = document.querySelectorAll('.service-check:checked');
      let selectedServices = [];
      checkboxes.forEach((cb) => selectedServices.push(cb.value));

      if(!name || !date || !text || selectedServices.length === 0) return alert("Please complete all fields and select at least one service to file a report.");

      try {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...'; btn.disabled = true;
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { btn.innerHTML = 'Submit Report to Management'; btn.disabled = false; return alert("Session expired. Please log in."); }

        const payload = {
          actionType: 'file_grievance',
          name: name,
          email: user.email,
          services: selectedServices.join(", "),
          date: date,
          details: text
        };

        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

        alert("Grievance submitted successfully. Please check your email for confirmation.");
        window.location.href = "dashboard.html";

      } catch(err) { alert("Error connecting to server."); btn.innerHTML = 'Submit Report to Management'; btn.disabled = false; }
    }
  </script>
</body>
</html>
