<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Maid Service | Priya Seva</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #f4f7f6; color: #333; }
    .navbar { background-color: #1e3c72; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .logo-text { font-size: 22px; font-weight: 700; color: white; margin: 0; display: flex; align-items: center; gap: 10px; text-decoration: none;}
    .nav-link { color: white; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.2s; }
    
    .page-wrapper { max-width: 800px; margin: 40px auto; padding: 20px; }
    .booking-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid #3498db;}
    h2 { color: #3498db; margin-top: 0; font-size: 28px; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px;}
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    .full-width { grid-column: 1 / -1; }
    
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #2c3e50; text-transform: uppercase; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Poppins'; font-size: 14px; box-sizing: border-box; background: #f8faff; transition: 0.3s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3498db; outline: none; background: white; }
    
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .checkbox-item { background: #f8faff; border: 2px solid #e2e8f0; padding: 10px 15px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;}
    .checkbox-item:hover { border-color: #3498db; }
    .checkbox-item input { margin: 0; cursor: pointer; accent-color: #3498db;}

    .confirm-btn { background: #3498db; color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;}
    .confirm-btn:hover { background: #2980b9; transform: translateY(-2px); }

    @media(max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo-text"><i class="fa-solid fa-hands-holding-child"></i> Priya Seva Center</a>
    <div style="display:flex; gap: 20px;">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
      <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="booking-card">
      <h2><i class="fa-solid fa-broom"></i> Custom Maid Plan</h2>
      <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 30px;">Design your perfect service plan. We will review your requirements and assign the best fit.</p>

      <div class="form-grid">
        <div class="form-group full-width">
          <label>Primary Contact Name</label>
          <input type="text" id="fullName" placeholder="Your Full Name" required>
        </div>

        <div class="form-group">
          <label>Service Duration</label>
          <select id="duration">
            <option value="1 Month (Trial)">1 Month (Trial)</option>
            <option value="2 Months">2 Months</option>
            <option value="6 Months">6 Months</option>
            <option value="1 Year Contract">1 Year Contract</option>
            <option value="Ongoing (Until Discontinued)">Ongoing (Until Discontinued)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Preferred Start Date</label>
          <input type="date" id="bookingDate" required>
        </div>

        <div class="form-group full-width">
          <label>Required Tasks</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Cooking"> Cooking</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Cleaning"> Cleaning</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Laundry"> Laundry</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Utensils"> Utensil Washing</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Caretaking"> Basic Caretaking</label>
          </div>
        </div>

        <div class="form-group">
          <label>Shift Timings & Splits</label>
          <input type="text" id="timings" placeholder="E.g., 9am-12pm AND 6pm-9pm">
        </div>

        <div class="form-group">
          <label>Preferred Gender</label>
          <select id="gender">
            <option value="Female Only">Female Only</option>
            <option value="Male Only">Male Only</option>
            <option value="No Preference">No Preference</option>
          </select>
        </div>
      </div>

      <button onclick="saveBooking()" class="confirm-btn" id="submitBtn"><i class="fa-solid fa-paper-plane"></i> Submit Request</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function saveBooking() {
      const btn = document.getElementById('submitBtn');
      const dateInput = document.getElementById('bookingDate').value;
      const nameInput = document.getElementById('fullName').value;

      if (!dateInput || !nameInput) return alert("Name and Start Date are required!");

      try {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;

        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            btn.innerHTML = 'Submit Request'; btn.disabled = false;
            return alert("You must be logged in to book. Please return to the homepage to log in.");
        }

        // Compile custom details
        const selectedTasks = Array.from(document.querySelectorAll('.task-cb:checked')).map(cb => cb.value).join(', ');
        const detailsObj = {
          Name: nameInput,
          Duration: document.getElementById('duration').value,
          Timings: document.getElementById('timings').value,
          Gender: document.getElementById('gender').value,
          Tasks: selectedTasks || 'General'
        };

        const { error } = await supabase.from('bookings').insert([{ 
            user_email: user.email, 
            service_type: 'Maid Services', 
            booking_date: dateInput,
            status: 'pending',
            details: JSON.stringify(detailsObj) // Saves formatted data to your new column
        }]);

        if (error) throw error;

        alert("Success! Your custom Maid request is under review.");
        window.location.href = "dashboard.html";

      } catch (err) {
        console.error(err);
        alert("Booking failed: " + err.message);
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Request';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
