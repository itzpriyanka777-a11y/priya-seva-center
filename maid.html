<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Maid Service | Priya Seva Center</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #f4f7f6; color: #333; }
    
    /* Navbar */
    .navbar { background-color: #1e3c72; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; color: white; }
    .logo-text { font-size: 22px; font-weight: 700; }
    .nav-link { color: white; text-decoration: none; font-weight: 600; font-size: 14px; }

    /* Page Container */
    .page-wrapper { max-width: 600px; margin: 50px auto; padding: 20px; }
    .booking-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    
    h2 { color: #3498db; margin-top: 0; font-size: 28px; }
    p { color: #7f8c8d; line-height: 1.6; margin-bottom: 30px; }

    /* Form Styling */
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #2c3e50; }
    .form-group input, .form-group textarea { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: 'Poppins', sans-serif; font-size: 15px; }
    
    .confirm-btn { background: #3498db; color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .confirm-btn:hover { background: #2980b9; transform: translateY(-2px); }
  </style>
</head>
<body>

  <nav class="navbar">
  <a href="index.html" class="logo-text" style="text-decoration: none; color: white; display: flex; align-items: center; gap: 10px;">
    <i class="fa-solid fa-hands-holding-child"></i> Priya Seva Center
  </a>
  <div style="display:flex; gap: 20px; align-items: center;">
    <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
  </div>
</nav>

  <div class="page-wrapper">
    <div class="booking-card">
      <h2><i class="fa-solid fa-broom"></i> Book Maid Service</h2>
      <p>Fill in the details below to request a professional maid for your home. We will confirm your slot shortly.</p>

      <div class="booking-form" id="bookingForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Your Name" required>
        </div>

        <div class="form-group">
          <label for="bookingDate">Preferred Service Date</label>
          <input type="date" id="bookingDate" required>
        </div>

        <div class="form-group">
          <label for="specialNote">Special Instructions (Optional)</label>
          <textarea id="specialNote" rows="3" placeholder="e.g., Specific cleaning requirements..."></textarea>
        </div>

        <button onclick="saveBooking()" class="confirm-btn">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function saveBooking() {
      // Get Values
      const dateInput = document.getElementById('bookingDate').value;
      const nameInput = document.getElementById('fullName').value;
      const noteInput = document.getElementById('specialNote').value;

      if (!dateInput || !nameInput) {
        return alert("Please fill in your name and the preferred date!");
      }

      // Check User Authentication
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        return alert("You must be logged in to book. Please sign in!");
      }

      // Insert into Supabase
      const { error } = await supabase
        .from('bookings')
        .insert([
          { 
            user_email: user.email, 
            service_type: 'Maid Services', 
            booking_date: dateInput,
            status: 'pending' 
            // Note: If you want to add more columns, add them to your table first!
          }
        ]);

      if (error) {
        console.error("Supabase Error:", error);
        alert("Booking failed: " + error.message);
      } else {
        alert("Booking confirmed! Redirecting to your dashboard...");
        window.location.href = "dashboard.html";
      }
    }
  </script>
</body>
</html>
