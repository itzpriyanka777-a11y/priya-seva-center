<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Priya Seva Center: Premier home healthcare and nursing visits in Kolkata. Professional wound care, vitals monitoring, and injections. Schedule your midnight-tech medical visit now.">
    <meta name="keywords" content="Home Nursing Kolkata, Health Care Visit, Wound Dressing, Medical Vitals Monitoring, Priya Seva Center">
    <title>Elite Health Care Visits | Midnight Protocol | Priya Seva Center</title>
    <style>
        :root {
            --midnight-bg: #050507;
            --terminal-surface: #0e0e12;
            --neon-pulse: #00e5ff;
            --text-main: #d1d1d1;
            --highlight: #ffffff;
        }

        body {
            background-color: var(--midnight-bg);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 40px;
            max-width: 1300px;
            width: 95%;
            padding: 50px 0;
        }

        .form-section {
            background: var(--terminal-surface);
            padding: 40px;
            border: 1px solid #1f1f26;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--highlight); font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 10px; }
        .tagline { color: var(--neon-pulse); font-weight: 600; margin-bottom: 30px; display: block; }

        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; color: #888; }
        input, textarea, select {
            width: 100%;
            padding: 15px;
            background: #15151b;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            transition: border 0.3s ease;
        }
        input:focus { border-color: var(--neon-pulse); outline: none; }

        .submit-btn {
            background: linear-gradient(90deg, var(--neon-pulse), #007bff);
            color: #000;
            padding: 18px;
            border: none;
            width: 100%;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 6px;
        }

        /* The Empty Video Panel */
        .video-staging-area {
            border: 2px dashed #222;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #0e0e12, #050507);
        }
    </style>
</head>
<body>

<main class="main-wrapper">
    <article class="form-section">
        <h1>Health Care Visit</h1>
        <span class="tagline">Midnight Protocol: Precision Nursing, Delivered.</span>
        
        <form action="#" method="POST">
            <div class="input-group">
                <label for="service">Select Clinical Procedure</label>
                <select id="service" name="service">
                    <option value="wound">Wound Care & Dressing</option>
                    <option value="vitals">Vitals Monitoring</option>
                    <option value="injection">Injection Services</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="address">Location in Kolkata</label>
                <input type="text" id="address" placeholder="Enter your area code/locality" required>
            </div>

            <button type="submit" class="submit-btn">Initialize Health Protocol</button>
        </form>
    </article>

    <aside class="video-staging-area" aria-label="Reserved area for Clinical Documentation Video">
        <p style="color: #333;">[ Awaiting Media Stream ]</p>
    </aside>
</main>

</body>
</html>
