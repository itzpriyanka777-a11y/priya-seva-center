<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Priya Seva Center: Futuristic medical visit scheduling for professional, reliable healthcare support.">
    <title>Clinical Visit Matrix | Midnight Terminal</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #16161a;
            --accent-color: #00f2ff;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 400px; /* Right panel reserved */
            gap: 30px;
            max-width: 1200px;
            margin: auto;
        }

        .terminal-panel {
            background: var(--panel-color);
            padding: 30px;
            border-left: 3px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .video-reserved-panel {
            background: #000;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            min-height: 400px;
        }

        h1 { color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; }
        
        input, select, textarea {
            width: 100%;
            background: #25252b;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 15px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { box-shadow: 0 0 15px var(--accent-color); }
    </style>
</head>
<body>

<main class="container">
    <section class="terminal-panel">
        <h1>Clinical Visit Matrix</h1>
        <p>System Status: Active. Configure your diagnostic parameters below.</p>
        
        <form aria-label="Patient Registration Form">
            <label for="patient-name">Patient Identity</label>
            <input type="text" id="patient-name" placeholder="Enter Full Medical Name" required>

            <label for="visit-date">Preferred Visit Timeline</label>
            <input type="date" id="visit-date">

            <label>Clinical Directives</label>
            <div>
                <input type="checkbox" id="wound"> <label for="wound">Wound Care</label>
                <input type="checkbox" id="vitals"> <label for="vitals">Vitals Monitor</label>
            </div>

            <label for="notes">Primary Diagnosis Profile</label>
            <textarea id="notes" rows="4"></textarea>

            <button type="submit">AUTHORIZE & DISPATCH VISIT</button>
        </form>
    </section>

    <aside class="video-reserved-panel" aria-label="Reserved for Video Playback">
        [ Video Interface Placeholder ]
    </aside>
</main>

</body>
</html>
