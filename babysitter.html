<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Babysitter | Priya Seva Center</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #f8faff; color: #333; }
    .navbar { background-color: #1e3c72; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .logo-text { color: white; font-size: 22px; font-weight: 700; }
    
    .content { max-width: 600px; margin: 60px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
    h2 { color: #f39c12; font-size: 28px; margin-bottom: 20px; }
    p { color: #7f8c8d; margin-bottom: 30px; }

    .booking-form { text-align: left; background: #fdfaf6; padding: 25px; border-radius: 12px; border: 1px solid #f39c1244; }
    .booking-form label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 14px; }
    .booking-form input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    
    .primary-auth-btn { background: #f39c12; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .primary-auth-btn:hover { background: #d68910; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo-text">Priya Seva Center</div>
    <a href="dashboard.html" style="color: white; font-weight: 600;"><i class="fa-solid fa-gauge"></i> Dashboard</a>
  </nav>

  <div class="content">
    <h2><i class="fa-solid fa-baby-carriage"></i> Book a Babysitter</h2>
    <p>Our verified, patient, and highly trained caretakers are ready to watch over your little ones.</p>

    <div class="booking-form">
      <label for="bookingDate">Select Appointment Date:</label>
      <input type="date" id="bookingDate" required>
      
      <button onclick="saveBooking('Babysitters')" class="primary-auth-btn">Confirm Booking</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function saveBooking(serviceName) {
      const dateInput = document.getElementById('bookingDate').value;
      if (!dateInput) return alert("Please select a date first!");

      // 1. Get the current user
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return alert("You must be logged in to book a service!");

      // 2. Save to Supabase
      const { error } = await supabase
        .from('bookings')
        .insert([
          { 
            user_email: user.email, 
            service_type: serviceName, 
            booking_date: dateInput,
            status: 'pending' 
          }
        ]);

      if (error) {
        alert("Booking failed: " + error.message);
      } else {
        alert("Success! Your booking has been saved.");
        window.location.href = "dashboard.html";
      }
    }
  </script>
</body>
</html>
