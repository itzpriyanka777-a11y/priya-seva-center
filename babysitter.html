<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Babysitting | Priya Seva</title>
  
  <meta name="theme-color" content="#020614">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --void-bg: #020614;
      --glass-base: rgba(10, 20, 35, 0.25);
      --glass-border: rgba(255, 255, 255, 0.08);
      --highlight: #00e5ff;
      --deep-ocean: #0055ff;
    }

    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: var(--void-bg); overflow: hidden; color: white; }

    #nightCanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
    #rippleContainer { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .water-ripple { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 25px rgba(0, 229, 255, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1); animation: rippleEffect 1.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; pointer-events: none; transform: translate(-50%, -50%); }
    @keyframes rippleEffect { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 300px; height: 300px; opacity: 0; border-width: 0px; } }

    .navbar { position: absolute; top: 0; left: 0; width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 9999; pointer-events: none; }
    .logo-text { font-size: 26px; font-weight: 700; color: white; display: flex; align-items: center; gap: 12px; text-decoration: none; text-shadow: 0 0 15px rgba(0, 229, 255, 0.6); pointer-events: auto;}
    .nav-link { color: white; text-decoration: none; font-weight: 600; font-size: 14px; background: rgba(10, 20, 35, 0.6); backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 30px; border: 1px solid var(--glass-border); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.6);}
    .nav-link:hover { transform: translateY(-3px) scale(1.05); background: rgba(0, 229, 255, 0.15); border-color: var(--highlight);}

    .split-layout { display: flex; height: 100vh; width: 100vw; position: relative; z-index: 10; }
    .left-pane { flex: 1.15; position: relative; display: flex; align-items: center; justify-content: center; padding: 100px 40px 20px 40px; box-sizing: border-box; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;}
    .left-pane::-webkit-scrollbar { width: 0px; }
    .form-container { position: relative; width: 100%; max-width: 500px; max-height: 85vh; padding-right: 15px;}
    
    .spatial-header { text-align: center; margin-bottom: 50px; animation: floatLiquid 6s ease-in-out infinite; z-index: 100;}
    .spatial-header h2 { margin: 0 0 10px 0; font-size: 40px; font-weight: 700; color: #fff; letter-spacing: 1px; text-shadow: 0 5px 25px rgba(0, 229, 255, 0.6), 0 0 40px rgba(0,0,0,1);}
    .spatial-header p { margin: 0 auto; font-size: 14px; color: #fff; font-weight: 500; max-width: 400px; line-height: 1.6; text-shadow: 0 2px 5px rgba(0,0,0,1);}

    .capsule-group { width: 100%; margin-bottom: 25px; position: relative; animation: floatLiquid 7s ease-in-out infinite alternate; }
    .capsule-group:nth-child(2) { animation-delay: 1s; z-index: 50; }
    .capsule-group:nth-child(3) { animation-delay: 2s; z-index: 40; }
    .capsule-group:nth-child(4) { animation-delay: 0.5s; z-index: 30; }
    .capsule-group:nth-child(5) { animation-delay: 1.5s; z-index: 20; }

    @keyframes floatLiquid { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

    .light-tracker { position: relative; width: 100%; }
    .light-tracker::after { content: ''; position: absolute; inset: 0px; border-radius: inherit; padding: 1.5px; background: radial-gradient(circle 120px at var(--mouse-x, -500px) var(--mouse-y, -500px), var(--highlight), var(--deep-ocean) 45%, transparent 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 10; }
    .light-tracker::before { content: ''; position: absolute; inset: 0; border-radius: inherit; background: radial-gradient(circle 180px at var(--mouse-x, -500px) var(--mouse-y, -500px), rgba(0, 229, 255, 0.1), transparent 100%); pointer-events: none; z-index: 0; }

    .input-group label { display: block; font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 2px 5px rgba(0,0,0,1);}
    
    .glass-render { width: 100%; padding: 18px 25px; background: var(--glass-base); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: inherit; color: #ffffff; font-family: 'Poppins'; font-size: 15px; font-weight: 600; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); outline: none; box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 2px 10px rgba(255, 255, 255, 0.1); position: relative; z-index: 1; text-shadow: 0 2px 5px rgba(0,0,0,1); }
    .glass-render::placeholder { color: rgba(255,255,255,0.6); text-transform: uppercase; font-size: 12px; letter-spacing: 1px;}
    .glass-render:hover { background: rgba(10, 20, 35, 0.6); transform: scale(1.02); }
    .glass-render:focus { transform: scale(1.04); background: rgba(0, 229, 255, 0.1); box-shadow: 0 15px 40px rgba(0, 229, 255, 0.2), inset 0 2px 10px rgba(0, 229, 255, 0.2); }

    .custom-select { position: relative; user-select: none; }
    .select-trigger { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .select-trigger span { text-transform: uppercase; font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.7); }
    .select-trigger.active span { color: white; font-size: 15px; text-transform: none; letter-spacing: 0; }
    
    .select-options { position: absolute; top: 110%; left: 0; right: 0; background: rgba(5, 10, 20, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); border-radius: inherit; overflow: hidden; display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.9);}
    .select-options.show { display: block; animation: dropBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .option { padding: 16px 25px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); text-shadow: 0 2px 5px rgba(0,0,0,0.9); position: relative; z-index: 1;}
    .option:hover { background: rgba(0, 229, 255, 0.2); padding-left: 35px; }

    .glass-calendar { display: none; background: rgba(5, 10, 20, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); border-radius: inherit; padding: 25px; margin-top: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 229, 255, 0.05); animation: dropBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
    .cal-top { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700; font-size: 14px; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,1); position: relative; z-index: 1;}
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; position: relative; z-index: 1;}
    .cal-day-name { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,1);}
    .cal-date { padding: 10px 0; background: transparent; border-radius: 12px; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid transparent; text-shadow: 0 2px 5px rgba(0,0,0,1);}
    .cal-date:hover { transform: scale(1.2) translateY(-4px); background: rgba(255,255,255,0.15); box-shadow: 0 5px 15px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.3);}
    .cal-date.selected { background: rgba(0, 229, 255, 0.3); color: white; border-color: var(--highlight); box-shadow: 0 10px 25px rgba(0, 229, 255, 0.4); transform: scale(1.3) translateY(-6px);}

    .submit-btn { width: 100%; padding: 22px; background: rgba(0, 229, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: inherit; color: var(--highlight); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); text-shadow: 0 2px 5px rgba(0,0,0,0.9); position: relative; z-index: 1;}
    .submit-btn:hover { transform: translateY(-5px) scale(1.03); background: rgba(0, 229, 255, 0.25); color: #fff; box-shadow: 0 25px 50px rgba(0, 229, 255, 0.3); text-shadow: 0 0 10px #fff; }
    
    @keyframes dropBounce { 0% { opacity: 0; transform: translateY(-20px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

    .right-pane { flex: 0.85; position: relative; background: transparent; overflow: hidden; pointer-events: none; -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 45%); mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 45%); }
    .video-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translateX(-50%) translateY(-50%); opacity: 0; object-fit: cover; z-index: 1; transition: opacity 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .video-bg.playing { opacity: 0.85; }

    /* MOBILE REVOLUTION CSS */
    @media (max-width: 900px) {
      body { overflow: auto; }
      .navbar { position: relative !important; padding: 25px 20px !important; background: transparent; }
      .split-layout { flex-direction: column; overflow-y: visible; height: auto; display: block;}
      .left-pane { padding: 10px 20px 40px 20px; min-height: auto; display: block; overflow-y: visible;}
      .right-pane { display: none !important; } /* Removes video pane on mobile */
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo-text"><i class="fa-solid fa-hands-holding-child" style="color: #00e5ff;"></i> Priya Seva</a>
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
  </nav>

  <canvas id="nightCanvas"></canvas>
  <div id="rippleContainer"></div>

  <div class="split-layout">
    <div class="left-pane">
      <div class="form-container" id="mainForm">
        
        <div class="spatial-header">
          <h2>Reserve a Babysitter</h2>
          <p>Configure your child care metrics below. Our system will immediately coordinate availability profiles.</p>
        </div>

        <div class="capsule-group input-group">
          <label>Your Full Name</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="text" id="parentName" class="glass-render" placeholder="E.g., Anjali Sharma" required>
          </div>
        </div>

        <div class="capsule-group input-group custom-select">
          <label>Number of Children</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <div class="glass-render select-trigger" id="childCountTrigger" onclick="toggleDropdown('childCountOptions')">
              <span>Select count</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
          </div>
          <div class="light-tracker select-options" id="childCountOptions" style="border-radius: 25px;">
            <div class="option" onclick="selectOption('childCountTrigger', 'childCountOptions', '1 Child')">1 Child</div>
            <div class="option" onclick="selectOption('childCountTrigger', 'childCountOptions', '2 Children')">2 Children</div>
            <div class="option" onclick="selectOption('childCountTrigger', 'childCountOptions', '3+ Children')">3+ Children</div>
          </div>
        </div>

        <div class="capsule-group input-group custom-select">
          <label>Service Frequency</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <div class="glass-render select-trigger" id="freqTrigger" onclick="toggleDropdown('freqOptions')">
              <span>Set frequency</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
          </div>
          <div class="light-tracker select-options" id="freqOptions" style="border-radius: 25px;">
            <div class="option" onclick="selectFrequency('Single Day Need')">Single Day Need</div>
            <div class="option" onclick="selectFrequency('Recurring Weekly')">Recurring Weekly</div>
            <div class="option" onclick="selectFrequency('Customized Dates')">Customized Dates</div>
          </div>
          
          <div class="light-tracker glass-calendar" id="visualCalendar" style="border-radius: 35px;">
            <div class="cal-top">
               <span>Select Dates:</span> 
               <div style="display:flex; align-items:center; gap: 15px;">
                   <span>May 2026</span>
                   <i class="fa-solid fa-xmark" style="cursor:pointer; color:rgba(255,255,255,0.5);" onclick="document.getElementById('visualCalendar').style.display='none'"></i>
               </div>
            </div>
            <div class="cal-days" style="margin-bottom:8px;">
              <span class="cal-day-name">S</span><span class="cal-day-name">M</span><span class="cal-day-name">T</span><span class="cal-day-name">W</span><span class="cal-day-name">T</span><span class="cal-day-name">F</span><span class="cal-day-name">S</span>
            </div>
            <div class="cal-days" id="calGrid"></div>
          </div>
          
          <div id="selectedDatesDisplay" style="display: none; margin-top: 15px; padding: 14px 20px; background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 20px; font-size: 13px; color: #fff; font-weight: 500; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <i class="fa-regular fa-calendar-check" style="color: #00e5ff; margin-right: 8px;"></i> <span id="datesText"></span>
          </div>

        </div>

        <div class="capsule-group input-group">
          <label>Required Time Window</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="text" id="timeWindow" class="glass-render" placeholder="E.g., 9:00 AM to 5:00 PM">
          </div>
        </div>

        <div class="capsule-group" style="margin-top: 35px;">
          <div class="light-tracker" style="border-radius: 50px;">
            <button onclick="submitRequest()" class="submit-btn" id="submitBtn">Generate Request</button>
          </div>
        </div>

      </div>
    </div>

    <div class="right-pane">
      <video autoplay loop muted playsinline class="video-bg" id="cinematicVideo" onplaying="this.classList.add('playing')">
        <source src="https://cdn.coverr.co/videos/coverr-a-mother-and-her-baby-playing-together-2621/1080p.mp4" type="video/mp4">
        <source src="./babysitter.mp4" type="video/mp4">
      </video>
    </div>

  </div>

  <script>
    const rippleContainer = document.getElementById('rippleContainer');
    function createRipple(x, y) {
      const ripple = document.createElement('div'); ripple.className = 'water-ripple'; ripple.style.left = x + 'px'; ripple.style.top = y + 'px';
      rippleContainer.appendChild(ripple); setTimeout(() => { ripple.remove(); }, 1800);
    }
    document.addEventListener('click', (e) => createRipple(e.clientX, e.clientY));
    
    let lastRippleTime = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if(now - lastRippleTime > 150) { createRipple(e.clientX, e.clientY); lastRippleTime = now; }
      document.querySelectorAll('.light-tracker').forEach(el => {
        const rect = el.getBoundingClientRect();
        el.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`); el.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
      });
    });

    const canvas = document.getElementById('nightCanvas'); const ctx = canvas.getContext('2d');
    let stars = []; let clouds = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    for(let i=0; i<400; i++) { stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 1.5, speed: (Math.random() * 0.12) + 0.04, twinklePhase: Math.random() * Math.PI * 2, twinkleSpeed: (Math.random() * 0.02) + 0.01, color: Math.random() > 0.85 ? '135, 235, 255' : '255, 255, 255' }); }
    for(let i=0; i<8; i++) {
      let baseSize = (Math.random() * 180) + 120; let subParts = []; let cloudCircles = Math.floor(Math.random() * 3) + 4; 
      for(let j=0; j<cloudCircles; j++) { subParts.push({ offsetX: (Math.random() - 0.5) * baseSize * 1.2, offsetY: (Math.random() - 0.5) * baseSize * 0.4, radius: (Math.random() * 0.4 + 0.6) * (baseSize * 0.5) }); }
      clouds.push({ x: Math.random() * canvas.width, y: (Math.random() * canvas.height * 0.85), parts: subParts, baseSize: baseSize, speed: (Math.random() * 0.25) + 0.12, opacity: (Math.random() * 0.14) + 0.04 });
    }

    function drawSereneSky() {
      ctx.fillStyle = '#020614'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => { s.x -= s.speed; if(s.x < 0) { s.x = canvas.width; s.y = Math.random() * canvas.height; } s.twinklePhase += s.twinkleSpeed; let opacity = Math.abs(Math.sin(s.twinklePhase)) * 0.8 + 0.2; ctx.fillStyle = `rgba(${s.color}, ${opacity})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); });
      clouds.forEach(c => {
        c.x += c.speed; if(c.x > canvas.width + c.baseSize * 2) { c.x = -c.baseSize * 2; c.y = (Math.random() * canvas.height * 0.85); }
        ctx.save(); ctx.shadowColor = 'rgba(2, 6, 20, 0.95)'; ctx.shadowBlur = c.baseSize * 0.6; ctx.fillStyle = `rgba(5, 14, 32, ${c.opacity})`;
        ctx.beginPath(); c.parts.forEach(p => { ctx.arc(c.x + p.offsetX, c.y + p.offsetY, p.radius, 0, Math.PI * 2); }); ctx.fill(); ctx.restore();
      });
      requestAnimationFrame(drawSereneSky);
    }
    drawSereneSky();

    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedFrequency = ""; let selectedDates = [];

    function toggleDropdown(id) { document.querySelectorAll('.select-options').forEach(el => { if(el.id !== id) el.classList.remove('show'); }); document.getElementById(id).classList.toggle('show'); }
    function selectOption(triggerId, dropdownId, value) { const trigger = document.getElementById(triggerId); trigger.innerHTML = `<span>${value}</span> <i class="fa-solid fa-chevron-down"></i>`; trigger.classList.add('active'); document.getElementById(dropdownId).classList.remove('show'); }
    function selectFrequency(value) { selectOption('freqTrigger', 'freqOptions', value); selectedFrequency = value; selectedDates = []; updateSelectedDatesDisplay(); document.getElementById('visualCalendar').style.display = 'block'; buildCalendarGrid(value === 'Single Day Need'); }

    function updateSelectedDatesDisplay() {
      const displayDiv = document.getElementById('selectedDatesDisplay'); const datesText = document.getElementById('datesText');
      if (selectedDates.length > 0) { datesText.innerText = "Selected: May " + selectedDates.sort((a,b)=>a-b).join(", "); displayDiv.style.display = 'block'; } else { displayDiv.style.display = 'none'; }
    }

    function buildCalendarGrid(isSingleSelect) {
      const grid = document.getElementById('calGrid'); grid.innerHTML = '';
      for(let i=0; i<5; i++) { grid.innerHTML += `<div></div>`; } 
      for(let i=1; i<=31; i++) {
        const div = document.createElement('div'); div.className = 'cal-date'; div.innerText = i;
        div.onclick = function(e) {
          createRipple(e.clientX, e.clientY);
          if(isSingleSelect) { document.querySelectorAll('.cal-date').forEach(d => d.classList.remove('selected')); selectedDates = [i]; this.classList.add('selected'); } 
          else { this.classList.toggle('selected'); if(this.classList.contains('selected')) selectedDates.push(i); else selectedDates = selectedDates.filter(d => d !== i); }
          updateSelectedDatesDisplay(); 
        };
        grid.appendChild(div);
      }
    }
    
    document.addEventListener('click', function(e) {
      if(!e.target.closest('.custom-select')) { document.querySelectorAll('.select-options').forEach(el => el.classList.remove('show')); }
      if(!e.target.closest('.glass-calendar') && !e.target.closest('.custom-select')) { document.getElementById('visualCalendar').style.display = 'none'; }
    });

    async function submitRequest() {
      const btn = document.getElementById('submitBtn'); const name = document.getElementById('parentName').value; const childCount = document.getElementById('childCountTrigger').innerText.trim(); const timeWindow = document.getElementById('timeWindow').value;
      if(!name || childCount.includes("Select") || selectedFrequency === "" || selectedDates.length === 0) { return alert("Please fill your name, select count, and pick your dates."); }
      
      try {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...'; btn.disabled = true;
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { btn.innerHTML = 'Generate Request'; btn.disabled = false; return alert("Authentication required. Please log in."); }

        let formattedDates = "May " + selectedDates.sort((a,b)=>a-b).join(", "); 
        const serviceName = "Babysitting - " + childCount;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcEfav22X3Rc5lyiJNXc6-mtr8CtaT3WHMDj-T9jvDaOX0cwK-fdBherWoa4OVmPE/exec";
        const payload = { name: name, email: user.email, phone: "Not Provided", serviceType: serviceName, date: formattedDates, address: "Not Provided", details: "Time: " + timeWindow + " | Frequency: " + selectedFrequency };

        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

        const adminWaNumber = "917439392803";
        const waMessage = `*New Booking Request!*\n\n*Service:* ${serviceName}\n*Client:* ${name}\n*Email:* ${user.email}\n*Frequency:* ${selectedFrequency}\n*Dates:* ${formattedDates}\n*Time:* ${timeWindow}`;
        window.open(`https://wa.me/${adminWaNumber}?text=${encodeURIComponent(waMessage)}`, '_blank');
        window.location.href = "dashboard.html";
      } catch (err) { alert("Transaction aborted: " + err.message); btn.innerHTML = 'Generate Request'; btn.disabled = false; }
    }
  </script>
</body>
</html>
