<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Babysitting | Priya Seva</title>
  
  <meta name="theme-color" content="#1e3c72">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #000; overflow: hidden; color: white; }
    
    /* Fixed Navbar with high Z-Index */
    .navbar { position: absolute; top: 0; left: 0; width: 100%; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 9999; }
    .logo-text { font-size: 24px; font-weight: 700; color: white; display: flex; align-items: center; gap: 10px; text-decoration: none; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
    .nav-link { color: white; text-decoration: none; font-weight: 600; font-size: 14px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
    .nav-link:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }

    /* Split Screen Layout */
    .split-layout { display: flex; height: 100vh; width: 100vw; }
    
    /* Left Side - Clear Image of a Smiling Baby */
    /* Pushed padding-top to 160px so the UI panel sits well below the logo */
    .left-pane { flex: 1.2; position: relative; background: url('https://images.unsplash.com/photo-1602722053020-af31042989d5?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat; display: flex; align-items: center; justify-content: center; padding: 160px 40px 40px 40px; box-sizing: border-box;}
    .left-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(15, 32, 66, 0.85) 0%, rgba(30, 60, 114, 0.6) 100%); z-index: 1; }
    
    /* Right Side - Reliable Video with Poster Fallback */
    .right-pane { flex: 0.8; position: relative; background: #000; overflow: hidden; }
    .video-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translateX(-50%) translateY(-50%); opacity: 0.9; object-fit: cover;}
    .video-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(15, 32, 66, 1) 0%, transparent 40%); z-index: 2;}

    /* Glass Container */
    .glass-form { position: relative; z-index: 10; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 24px; padding: 40px; width: 100%; max-width: 550px; max-height: 80vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
    
    /* Custom Scrollbar */
    .glass-form::-webkit-scrollbar { width: 6px; }
    .glass-form::-webkit-scrollbar-track { background: transparent; }
    .glass-form::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

    .form-header h2 { margin: 0 0 5px 0; font-size: 32px; font-weight: 700; color: #fff; letter-spacing: 0.5px;}
    .form-header p { margin: 0 0 30px 0; font-size: 14px; color: rgba(255,255,255,0.85); }

    .input-group { margin-bottom: 25px; position: relative;}
    .input-group label { display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.95); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
    
    .glass-input { width: 100%; padding: 16px 20px; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-family: 'Poppins'; font-size: 15px; box-sizing: border-box; transition: 0.3s; outline: none; }
    .glass-input::placeholder { color: rgba(255,255,255,0.6); }
    .glass-input:focus { border-color: #f39c12; background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 15px rgba(243, 156, 18, 0.4); }

    /* Custom Glass Dropdown */
    .custom-select { position: relative; user-select: none; }
    .select-trigger { width: 100%; padding: 16px 20px; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-size: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; box-sizing: border-box;}
    .select-trigger:hover { background: rgba(0, 0, 0, 0.4); }
    .select-options { position: absolute; top: 100%; left: 0; right: 0; background: rgba(15, 32, 66, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; margin-top: 8px; overflow: hidden; display: none; z-index: 100; box-shadow: 0 15px 30px rgba(0,0,0,0.5);}
    .select-options.show { display: block; animation: slideDown 0.3s ease; }
    .option { padding: 15px 20px; color: white; cursor: pointer; transition: 0.2s; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05);}
    .option:last-child { border-bottom: none; }
    .option:hover { background: rgba(243, 156, 18, 0.9); padding-left: 25px; }

    /* Interactive UI Calendar */
    .glass-calendar { display: none; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 20px; margin-top: 15px; animation: slideDown 0.4s ease;}
    .cal-top { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 600; }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
    .cal-day-name { font-size: 11px; color: rgba(255,255,255,0.7); text-transform: uppercase;}
    .cal-date { padding: 10px 0; background: rgba(255,255,255,0.1); border-radius: 8px; font-size: 13px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;}
    .cal-date:hover { background: rgba(255,255,255,0.2); }
    .cal-date.selected { background: #f39c12; color: white; border-color: #e67e22; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.5); transform: scale(1.05);}

    .submit-btn { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); color: white; width: 100%; padding: 20px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(243, 156, 18, 0.4); text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;}
    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(243, 156, 18, 0.6); }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) {
      .split-layout { flex-direction: column; overflow-y: auto; height: auto;}
      body { overflow: auto; }
      .right-pane { display: none; }
      .left-pane { padding: 180px 20px 40px 20px; min-height: 100vh;}
      .glass-form { max-height: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo-text"><i class="fa-solid fa-hands-holding-child" style="color: #f39c12;"></i> Priya Seva</a>
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
  </nav>

  <div class="split-layout">
    
    <div class="left-pane">
      <div class="left-overlay"></div>
      
      <div class="glass-form">
        <div class="form-header">
          <h2><i class="fa-solid fa-baby-carriage" style="color: #f39c12;"></i> Reserve a Babysitter</h2>
          <p>Customize your care plan. Select your preferences below and let our algorithm find the perfect match.</p>
        </div>

        <div class="input-group">
          <label>Your Full Name</label>
          <input type="text" id="parentName" class="glass-input" placeholder="E.g., Anjali Sharma" required>
        </div>

        <div class="input-group">
          <label>Number of Children</label>
          <div class="custom-select">
            <div class="select-trigger" id="childCountTrigger" onclick="toggleDropdown('childCountOptions')">
              <span>Select count...</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="select-options" id="childCountOptions">
              <div class="option" onclick="selectOption('childCountTrigger', 'childCountOptions', '1 Child')">1 Child</div>
              <div class="option" onclick="selectOption('childCountTrigger', 'childCountOptions', '2 Children')">2 Children</div>
              <div class="option" onclick="selectOption('childCountTrigger', 'childCountOptions', '3+ Children')">3+ Children</div>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label>Service Frequency</label>
          <div class="custom-select">
            <div class="select-trigger" id="freqTrigger" onclick="toggleDropdown('freqOptions')">
              <span>Select frequency...</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="select-options" id="freqOptions">
              <div class="option" onclick="selectFrequency('Single Day Need')">Single Day Need</div>
              <div class="option" onclick="selectFrequency('Recurring Weekly')">Recurring Weekly</div>
              <div class="option" onclick="selectFrequency('Customized Dates')">Customized Dates</div>
            </div>
          </div>
          
          <div class="glass-calendar" id="visualCalendar">
            <div class="cal-top"><span>Select Your Dates:</span> <span>May 2026</span></div>
            <div class="cal-days" style="margin-bottom:10px;">
              <span class="cal-day-name">S</span><span class="cal-day-name">M</span><span class="cal-day-name">T</span><span class="cal-day-name">W</span><span class="cal-day-name">T</span><span class="cal-day-name">F</span><span class="cal-day-name">S</span>
            </div>
            <div class="cal-days" id="calGrid"></div>
          </div>
        </div>

        <div class="input-group">
          <label>Required Time Window</label>
          <input type="text" id="timeWindow" class="glass-input" placeholder="E.g., 9:00 AM to 5:00 PM">
        </div>

        <button onclick="submitRequest()" class="submit-btn" id="submitBtn">Generate Request</button>
      </div>
    </div>

    <div class="right-pane">
      <div class="video-overlay"></div>
      <video autoplay loop muted playsinline class="video-bg" poster="https://images.unsplash.com/photo-1544126592-807ade215a0b?auto=format&fit=crop&w=2000">
        <source src="https://cdn.coverr.co/videos/coverr-a-mother-and-her-baby-playing-together-2621/1080p.mp4" type="video/mp4">
      </video>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedFrequency = "";
    let selectedDates = [];

    function toggleDropdown(id) {
      document.querySelectorAll('.select-options').forEach(el => {
        if(el.id !== id) el.classList.remove('show');
      });
      document.getElementById(id).classList.toggle('show');
    }

    function selectOption(triggerId, dropdownId, value) {
      document.getElementById(triggerId).innerHTML = `<span>${value}</span> <i class="fa-solid fa-chevron-down"></i>`;
      document.getElementById(dropdownId).classList.remove('show');
    }

    function selectFrequency(value) {
      selectOption('freqTrigger', 'freqOptions', value);
      selectedFrequency = value;
      selectedDates = []; 
      
      const calWidget = document.getElementById('visualCalendar');
      calWidget.style.display = 'block';
      buildCalendarGrid(value === 'Single Day Need');
    }

    function buildCalendarGrid(isSingleSelect) {
      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';
      
      for(let i=0; i<5; i++) { grid.innerHTML += `<div></div>`; }
      
      for(let i=1; i<=31; i++) {
        const div = document.createElement('div');
        div.className = 'cal-date';
        div.innerText = i;
        div.onclick = function() {
          if(isSingleSelect) {
            document.querySelectorAll('.cal-date').forEach(d => d.classList.remove('selected'));
            selectedDates = [i];
            this.classList.add('selected');
          } else {
            this.classList.toggle('selected');
            if(this.classList.contains('selected')) selectedDates.push(i);
            else selectedDates = selectedDates.filter(d => d !== i);
          }
        };
        grid.appendChild(div);
      }
    }

    document.addEventListener('click', function(e) {
      if(!e.target.closest('.custom-select')) {
        document.querySelectorAll('.select-options').forEach(el => el.classList.remove('show'));
      }
    });

    async function submitRequest() {
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('parentName').value;
      const childCount = document.getElementById('childCountTrigger').innerText.trim();
      const timeWindow = document.getElementById('timeWindow').value;

      if(!name || selectedFrequency === "" || selectedDates.length === 0) {
        return alert("Please fill your name and select your required dates from the calendar.");
      }

      try {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;

        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) {
          btn.innerHTML = 'Generate Request'; btn.disabled = false;
          return alert("Authentication required. Please return to the homepage to log in.");
        }

        let formattedDates = "May " + selectedDates.sort((a,b)=>a-b).join(", ");
        let primaryDate = `2026-05-${String(selectedDates.sort((a,b)=>a-b)[0]).padStart(2, '0')}`;

        const detailsPayload = {
          Parent_Name: name,
          Children: childCount.replace("Select count...", "Not Specified"),
          Frequency: selectedFrequency,
          Selected_Dates: formattedDates,
          Timings: timeWindow
        };

        const { error } = await supabaseClient.from('bookings').insert([{ 
            user_email: user.email, 
            service_type: 'Babysitters', 
            booking_date: primaryDate,
            status: 'pending',
            details: JSON.stringify(detailsPayload)
        }]);

        if (error) throw error;
        window.location.href = "dashboard.html";

      } catch (err) {
        alert("Transaction aborted: " + err.message);
        btn.innerHTML = 'Generate Request';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
