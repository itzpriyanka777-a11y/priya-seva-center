<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Babysitter | Priya Seva</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #f4f7f6; color: #333; }
    .navbar { background-color: #1e3c72; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    .logo-text { font-size: 22px; font-weight: 700; color: white; margin: 0; display: flex; align-items: center; gap: 10px; text-decoration: none;}
    .nav-link { color: white; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.2s; }
    
    .page-wrapper { max-width: 800px; margin: 40px auto; padding: 20px; }
    .booking-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid #f39c12;}
    h2 { color: #f39c12; margin-top: 0; font-size: 28px; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px;}
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    .full-width { grid-column: 1 / -1; }
    
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #2c3e50; text-transform: uppercase; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Poppins'; font-size: 14px; box-sizing: border-box; background: #f8faff; transition: 0.3s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #f39c12; outline: none; background: white; }
    
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .checkbox-item { background: #f8faff; border: 2px solid #e2e8f0; padding: 10px 15px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;}
    .checkbox-item:hover { border-color: #f39c12; }
    .checkbox-item input { margin: 0; cursor: pointer; accent-color: #f39c12;}

    .confirm-btn { background: #f39c12; color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;}
    .confirm-btn:hover { background: #d68910; transform: translateY(-2px); }

    @media(max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo-text"><i class="fa-solid fa-hands-holding-child"></i> Priya Seva Center</a>
    <div style="display:flex; gap: 20px;">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
      <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="booking-card">
      <h2><i class="fa-solid fa-baby-carriage"></i> Babysitter Booking</h2>
      <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 30px;">Secure a verified caretaker for your children. Let us know exactly what duties are required.</p>

      <div class="form-grid">
        <div class="form-group">
          <label>Parent/Guardian Name</label>
          <input type="text" id="fullName" placeholder="Your Name" required>
        </div>

        <div class="form-group">
          <label>Number of Children</label>
          <input type="number" id="numChildren" min="1" max="5" value="1">
        </div>

        <div class="form-group full-width">
          <label>Ages of Children</label>
          <input type="text" id="ages" placeholder="E.g., 2 years old and 6 months old" required>
        </div>

        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="bookingDate" required>
        </div>

        <div class="form-group">
          <label>End Date (Optional)</label>
          <input type="date" id="endDate">
        </div>

        <div class="form-group full-width">
          <label>Daily Timings / Duration</label>
          <input type="text" id="timings" placeholder="E.g., Mon-Fri 10am to 4pm, or Date Night 7pm to 11pm">
        </div>

        <div class="form-group full-width">
          <label>Required Tasks</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Feeding/Meal Prep"> Feeding/Meal Prep</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Bathing"> Bathing</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Playtime"> Playtime</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Sleep Training"> Sleep/Nap Training</label>
            <label class="checkbox-item"><input type="checkbox" class="task-cb" value="Homework Help"> Homework Help</label>
          </div>
        </div>
      </div>

      <button onclick="saveBooking()" class="confirm-btn" id="submitBtn"><i class="fa-solid fa-paper-plane"></i> Book Babysitter</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function saveBooking() {
      const btn = document.getElementById('submitBtn');
      const dateInput = document.getElementById('bookingDate').value;
      const nameInput = document.getElementById('fullName').value;

      if (!dateInput || !nameInput) return alert("Parent Name and Start Date are required!");

      try {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;

        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            btn.innerHTML = 'Book Babysitter'; btn.disabled = false;
            return alert("You must be logged in to book.");
        }

        const selectedTasks = Array.from(document.querySelectorAll('.task-cb:checked')).map(cb => cb.value).join(', ');
        const detailsObj = {
          Parent: nameInput,
          Kids_Count: document.getElementById('numChildren').value,
          Kids_Ages: document.getElementById('ages').value,
          End_Date: document.getElementById('endDate').value,
          Timings: document.getElementById('timings').value,
          Tasks: selectedTasks || 'Basic Supervision'
        };

        const { error } = await supabase.from('bookings').insert([{ 
            user_email: user.email, 
            service_type: 'Babysitters', 
            booking_date: dateInput,
            status: 'pending',
            details: JSON.stringify(detailsObj)
        }]);

        if (error) throw error;

        alert("Success! Your babysitting request has been confirmed.");
        window.location.href = "dashboard.html";

      } catch (err) {
        console.error(err);
        alert("Booking failed: " + err.message);
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Book Babysitter';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
