<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Absence | Priya Seva</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #fdf2e9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    
    .absence-card { background: white; width: 90%; max-width: 400px; border-radius: 16px; box-shadow: 0 10px 30px rgba(231, 76, 60, 0.15); padding: 30px; text-align: center; border-top: 6px solid #e74c3c; }
    
    .icon-wrapper { background: #fadbd8; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; }
    .icon-wrapper i { font-size: 30px; color: #e74c3c; }

    h1 { font-size: 24px; color: #c0392b; margin-top: 0; margin-bottom: 10px; }
    p { font-size: 14px; color: #7f8c8d; margin-bottom: 25px; line-height: 1.5; }

    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #2c3e50; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 16px; box-sizing: border-box; background-color: #f8faff; transition: border-color 0.3s; }
    .form-group input:focus { outline: none; border-color: #e74c3c; background-color: white; }

    .submit-btn { background: #e74c3c; color: white; width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.3s; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3); }
    .submit-btn:hover { background: #c0392b; }

    #successMessage { display: none; margin-top: 20px; padding: 15px; background: #d5f5e3; color: #27ae60; border-radius: 8px; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>

  <div class="absence-card">
    <div class="icon-wrapper">
      <i class="fa-solid fa-user-xmark"></i>
    </div>
    <h1>Report Absence</h1>
    <p>Please confirm your registered phone number below to instantly mark today's service as absent. Your billing will be adjusted.</p>

    <form id="absenceForm" onsubmit="submitAbsence(event)">
      
      <div class="form-group">
        <label for="clientPhone">Registered Mobile Number</label>
        <input type="tel" id="clientPhone" placeholder="E.g., 9876543210" required>
      </div>

      <div class="form-group">
        <label for="absenceDate">Date of Absence</label>
        <input type="date" id="absenceDate" required>
      </div>

      <button type="submit" class="submit-btn" id="btnText">Mark as Absent</button>
    </form>

    <div id="successMessage">
      <i class="fa-solid fa-circle-check"></i> Absence logged successfully. Your dashboard has been updated.
    </div>

    <a href="dashboard.html" style="display: block; margin-top: 20px; color: #7f8c8d; font-size: 13px; text-decoration: none; font-weight: 600;">Back to Dashboard</a>
  </div>

  <script>
    // Automatically set the date picker to TODAY's date so the client doesn't have to think
    document.getElementById('absenceDate').valueAsDate = new Date();

    async function submitAbsence(event) {
      event.preventDefault(); 
      
      const phone = document.getElementById('clientPhone').value;
      const date = document.getElementById('absenceDate').value;
      const btn = document.getElementById('btnText');
      
      btn.innerHTML = "Logging Absence...";
      btn.style.opacity = "0.7";

      // THE DATABASE LOGIC (SHEETDB)
      // When you create your SheetDB API, put the URL here.
      const sheetApiUrl = 'https://sheetdb.io/api/v1/YOUR_UNIQUE_KEY'; 

      // We package the data exactly how it looks in your Google Sheet columns
      const dataPayload = {
        data: [
          {
            "ClientID": phone, // Using phone number as their ID
            "Date": date,
            "Status": "Missed"
          }
        ]
      };

      try {
        // Send the data to Google Sheets
        await fetch(sheetApiUrl, {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(dataPayload)
        });

        // Hide form, show success
        document.getElementById('absenceForm').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';

      } catch (error) {
        alert("There was an error updating the database. Please contact support.");
        btn.innerHTML = "Mark as Absent";
        btn.style.opacity = "1";
      }
    }
  </script>
</body>
</html>
