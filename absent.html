<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Absent | Priya Seva</title>
  <meta name="theme-color" content="#020614">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* SCROLLBAR NUKE - Hides scrollbars on all browsers but keeps scrolling active */
    ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
    * { scrollbar-width: none !important; -ms-overflow-style: none !important; }

    :root { --void-bg: #020614; --glass-base: rgba(10, 20, 35, 0.25); --glass-border: rgba(255, 255, 255, 0.08); --highlight: #e74c3c; }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* THE SCORCHED-EARTH GOOGLE TRANSLATE NUKE */
    html { top: 0px !important; margin-top: 0px !important; padding-top: 0px !important; }
    body { top: 0px !important; margin-top: 0px !important; position: static !important; }
    .skiptranslate, iframe.goog-te-banner-frame, .VIpgJd-Zvi9od-aZ2wEe-wOHMyf, .VIpgJd-Zvi9od-ORHb-OEVmcd, #goog-gt-tt, .goog-te-balloon-frame { display: none !important; width: 0 !important; height: 0 !important; visibility: hidden !important; }
    .goog-text-highlight { background: none !important; box-shadow: none !important; border: none !important;}

    /* ANTI-FLASH FADE */
    body { 
      opacity: 0; 
      animation: smoothLoad 0.8s ease-in 0.6s forwards; 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--void-bg); 
      color: white; 
      overflow: hidden; 
    }
    @keyframes smoothLoad { to { opacity: 1; } }

    #nightCanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
    #rippleContainer { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .water-ripple { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 25px rgba(231, 76, 60, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1); animation: rippleEffect 1.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; pointer-events: none; transform: translate(-50%, -50%); }
    @keyframes rippleEffect { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 300px; height: 300px; opacity: 0; border-width: 0px; } }

    /* UNIVERSAL HEADER & NEW LOGO LAYOUT */
    .universal-header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10000; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5, 5, 16, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-sizing: border-box;}
    
    .logo-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: 0.3s; margin-top: -10px; text-decoration: none;}
    .logo-container:hover { transform: scale(1.05); }
    .logo-icon { font-size: 24px; color: var(--highlight); background: rgba(231, 76, 60, 0.1); padding: 10px 12px; border-radius: 12px; box-shadow: 0 0 15px rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.3);}
    .logo-text { color: white; font-weight: 600; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); font-size: 13px; text-align: center; text-transform: uppercase;}
    .mobile-brand { display: none; }
    .desktop-brand { display: inline; }

    .universal-nav-right { display: flex; gap: 15px; align-items: center;}
    .universal-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Poppins'; font-weight: 600; font-size: 13px; transition: 0.3s; text-decoration: none; display: flex; align-items: center; gap: 8px;}
    .universal-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
    .btn-dash { border-color: rgba(231, 76, 60, 0.3); color: #e74c3c; }
    .btn-dash:hover { background: rgba(231, 76, 60, 0.1); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.2);}

    /* LANGUAGE DROPDOWN CSS */
    .menu-container { position: relative; display: inline-block; }
    .menu-btn { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 15px; font-size: 16px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; backdrop-filter: blur(10px);}
    .menu-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: white;}
    .dropdown-content { display: none; position: absolute; right: 0; top: 110%; background: rgba(5, 10, 20, 0.95); backdrop-filter: blur(20px); min-width: 150px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid var(--glass-border); overflow: hidden; z-index: 99;}
    .dropdown-content a { color: #e2e8f0; padding: 16px 22px; display: block; font-weight: 500; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; text-decoration: none;}
    .dropdown-content a:hover { background: rgba(231, 76, 60, 0.1); color: white; padding-left: 28px;}
    .menu-container:hover .dropdown-content { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .split-layout { display: flex; height: 100vh; width: 100vw; position: relative; z-index: 10; }
    .left-pane { flex: 1.15; position: relative; display: flex; align-items: center; justify-content: center; padding: 100px 40px 20px 40px; box-sizing: border-box; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;}
    .left-pane::-webkit-scrollbar { width: 0px; }
    .form-container { position: relative; width: 100%; max-width: 500px; padding-right: 15px;}
    
    .spatial-header { text-align: center; margin-bottom: 40px; animation: floatLiquid 6s ease-in-out infinite; z-index: 100;}
    .spatial-header h2 { margin: 0 0 10px 0; font-size: 38px; font-weight: 700; color: #fff; letter-spacing: 1px; text-shadow: 0 5px 25px rgba(231, 76, 60, 0.6), 0 0 40px rgba(0,0,0,1);}
    .spatial-header p { margin: 0 auto; font-size: 14px; color: rgba(255,255,255,0.8); font-weight: 500; max-width: 400px; line-height: 1.6;}

    .capsule-group { width: 100%; margin-bottom: 25px; position: relative; animation: floatLiquid 7s ease-in-out infinite alternate; }
    @keyframes floatLiquid { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

    .light-tracker { position: relative; width: 100%; }
    .light-tracker::after { content: ''; position: absolute; inset: 0px; border-radius: inherit; padding: 1.5px; background: radial-gradient(circle 120px at var(--mouse-x, -500px) var(--mouse-y, -500px), var(--highlight), transparent 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; pointer-events: none; z-index: 10; }
    .light-tracker::before { content: ''; position: absolute; inset: 0; border-radius: inherit; background: radial-gradient(circle 180px at var(--mouse-x, -500px) var(--mouse-y, -500px), rgba(231, 76, 60, 0.1), transparent 100%); pointer-events: none; z-index: 0; }

    .input-group label { display: block; font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px;}
    .glass-render { width: 100%; padding: 18px 25px; background: var(--glass-base); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: 50px; color: #ffffff; font-family: 'Poppins'; font-size: 15px; font-weight: 600; box-sizing: border-box; transition: 0.4s; outline: none; position: relative; z-index: 1; }
    .glass-render::placeholder { color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 400;}
    .glass-render:focus { transform: scale(1.02); background: rgba(231, 76, 60, 0.1); border-color: var(--highlight); box-shadow: 0 10px 30px rgba(231, 76, 60, 0.2);}
    
    /* Make date pickers look good in dark mode */
    input[type="date"].glass-render { color-scheme: dark; cursor: pointer; }

    .custom-select { position: relative; user-select: none; }
    .select-trigger { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .select-options { position: absolute; top: 110%; left: 0; right: 0; background: rgba(5, 10, 20, 0.95); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; overflow: hidden; display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.9); z-index: 99;}
    .select-options.show { display: block; animation: slideUp 0.3s ease; }
    .option { padding: 16px 25px; color: #fff; font-weight: 500; cursor: pointer; transition: 0.3s; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05);}
    .option:last-child { border-bottom: none; }
    .option:hover { background: rgba(231, 76, 60, 0.2); padding-left: 35px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .submit-btn { width: 100%; padding: 22px; background: rgba(231, 76, 60, 0.1); border: 1px solid var(--highlight); border-radius: 50px; color: var(--highlight); font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; position: relative; z-index: 1;}
    .submit-btn:hover { transform: translateY(-3px) scale(1.02); background: var(--highlight); color: #fff; box-shadow: 0 15px 30px rgba(231, 76, 60, 0.4); }

    .right-pane { flex: 0.85; position: relative; background: transparent; overflow: hidden; pointer-events: none; -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 45%); }
    .video-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translateX(-50%) translateY(-50%); object-fit: cover; z-index: 1; opacity: 0.6;}

    /* Mobile Updates matching Pristine Template */
    @media (max-width: 900px) {
      body { overflow: auto; }
      .split-layout { flex-direction: column; height: auto; display: block;}
      .left-pane { padding: 100px 20px 40px 20px; display: block;}
      .right-pane { display: none !important; } 
    }

    @media (max-width: 768px) {
       .universal-header { padding: 15px 10px; }
       .logo-container { align-items: flex-start; gap: 4px; margin-left: 5px; }
       .logo-icon { font-size: 18px; padding: 8px 10px; }
       .logo-text { font-size: 11px; text-align: left; letter-spacing: 0.5px;}
       .mobile-brand { display: block; }
       .desktop-brand { display: none; }
       
       .universal-btn { padding: 8px 12px; font-size: 12px; }
       .universal-btn span { display: none; }
    }
  </style>
</head>
<body>

  <div id="google_translate_element" style="display:none; width:0; height:0; position:absolute;"></div>

  <header class="universal-header">
    <a href="index.html" class="logo-container">
      <div class="logo-icon"><i class="fa-solid fa-hands-holding-child"></i></div>
      <div class="logo-text">
        <span class="desktop-brand">Priya Seva Center</span>
        <span class="mobile-brand">Priya Seva Centre</span>
      </div>
    </a>
    <div class="universal-nav-right">
      <a href="index.html" class="universal-btn"><i class="fa-solid fa-house"></i> <span>Home</span></a>
      <a href="dashboard.html" class="universal-btn btn-dash"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a>
      
      <div class="menu-container">
        <button class="menu-btn" title="Change Language"><i class="fa-solid fa-globe"></i></button>
        <div class="dropdown-content">
          <a href="#" onclick="changeLanguage('en'); return false;">English</a>
          <a href="#" onclick="changeLanguage('hi'); return false;">हिन्दी (Hindi)</a>
          <a href="#" onclick="changeLanguage('bn'); return false;">বাংলা (Bengali)</a>
        </div>
      </div>

    </div>
  </header>

  <canvas id="nightCanvas"></canvas>
  <div id="rippleContainer"></div>

  <div class="split-layout">
    <div class="left-pane">
      <div class="form-container">
        
        <div class="spatial-header">
          <h2>Mark Absent</h2>
          <p>Tell us if you are going away or if your worker did not come to work today.</p>
        </div>

        <div class="capsule-group input-group">
          <label>Your Full Name</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="text" id="clientName" class="glass-render" placeholder="Type your name" required>
          </div>
        </div>

        <!-- FIX: Hooked up dropdowns and data-value attributes -->
        <div class="capsule-group input-group custom-select">
          <label>Who is Absent?</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <div class="glass-render select-trigger" id="whoTrigger" data-value="" onclick="toggleDropdown('whoOptions')">
              <span style="color:rgba(255,255,255,0.5); font-weight:400;">Select one</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
          </div>
          <div class="light-tracker select-options" id="whoOptions">
            <div class="option" onclick="selectOption('whoTrigger', 'whoOptions', 'I am going away')">I am going away</div>
            <div class="option" onclick="selectOption('whoTrigger', 'whoOptions', 'Worker did not come')">Worker did not come</div>
          </div>
        </div>

        <div class="capsule-group input-group custom-select">
          <label>Choose Service</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <div class="glass-render select-trigger" id="serviceTrigger" data-value="" onclick="toggleDropdown('serviceOptions')">
              <span style="color:rgba(255,255,255,0.5); font-weight:400;">Select service</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
          </div>
          <div class="light-tracker select-options" id="serviceOptions">
            <div class="option" onclick="selectOption('serviceTrigger', 'serviceOptions', 'Maid')">Maid</div>
            <div class="option" onclick="selectOption('serviceTrigger', 'serviceOptions', 'Nurse')">Nurse</div>
            <div class="option" onclick="selectOption('serviceTrigger', 'serviceOptions', 'Babysitter')">Babysitter</div>
          </div>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 25px;">
          <div class="capsule-group input-group" style="margin-bottom: 0;">
            <label>Start Date</label>
            <div class="light-tracker" style="border-radius: 50px;">
              <input type="date" id="startDate" class="glass-render" onclick="this.showPicker ? this.showPicker() : null">
            </div>
          </div>
          <div class="capsule-group input-group" style="margin-bottom: 0;">
            <label>End Date</label>
            <div class="light-tracker" style="border-radius: 50px;">
              <input type="date" id="endDate" class="glass-render" onclick="this.showPicker ? this.showPicker() : null">
            </div>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Reason</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="text" id="reasonText" class="glass-render" placeholder="Example: Going on holiday">
          </div>
        </div>

        <div class="capsule-group" style="margin-top: 35px;">
          <div class="light-tracker" style="border-radius: 50px;">
            <button onclick="submitAbsence()" class="submit-btn" id="submitBtn">Send Request</button>
          </div>
        </div>

      </div>
    </div>

    <div class="right-pane">
      <img src="https://images.pexels.com/photos/10045827/pexels-photo-10045827.jpeg" class="video-bg" alt="Calendar">
    </div>
  </div>
  <script type="text/javascript">
    // 1. Force the language immediately to stop the choppy English flash
    let savedLang = localStorage.getItem('priyaSevaLang') || 'bn';
    document.cookie = `googtrans=/en/${savedLang}; path=/; domain=${window.location.hostname}`;
    document.cookie = `googtrans=/en/${savedLang}; path=/`;

    // 2. Initialize Google Translate Invisibly
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'en,hi,bn', autoDisplay: false }, 'google_translate_element');
    }

    // 3. The Global Switcher
    function changeLanguage(langCode) {
      localStorage.setItem('priyaSevaLang', langCode); 
      localStorage.setItem('langChoiceMade', 'true');  
      document.cookie = `googtrans=/en/${langCode}; path=/; domain=${window.location.hostname}`;
      document.cookie = `googtrans=/en/${langCode}; path=/`;
      window.location.reload(); 
    }

    // 4. WATER RIPPLE CLICK EFFECT
    const rippleContainer = document.getElementById('rippleContainer');
    document.addEventListener('click', (e) => {
      if(e.target.closest('button') || e.target.closest('input') || e.target.closest('.custom-select')) return;
      const ripple = document.createElement('div'); ripple.className = 'water-ripple';
      ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
      rippleContainer.appendChild(ripple); setTimeout(() => ripple.remove(), 1800);
    });

    // 5. THE MAGIC SCRIPT: Desktop Mouse & Mobile Touch Tracker
    let touchTicking = false;
    function updateLightTracker(clientX, clientY) {
      if (!isTicking) {
        window.requestAnimationFrame(() => {
          document.querySelectorAll('.light-tracker').forEach(el => {
            const rect = el.getBoundingClientRect(); 
            el.style.setProperty('--mouse-x', `${clientX - rect.left}px`); 
            el.style.setProperty('--mouse-y', `${clientY - rect.top}px`);
          });
          isTicking = false;
        });
        isTicking = true;
      }
    }
    // Listen for Mouse
    document.addEventListener('mousemove', (e) => updateLightTracker(e.clientX, e.clientY));
    // Listen for Touch/Swipe
    document.addEventListener('touchmove', (e) => {
      if(e.touches.length > 0) updateLightTracker(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    // Listen for Tap
    document.addEventListener('touchstart', (e) => {
      if(e.touches.length > 0) updateLightTracker(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });


    // 6. CUSTOM DROPDOWN ENGINE
    function toggleDropdown(optionsId) {
      const options = document.getElementById(optionsId);
      const isCurrentlyShowing = options.classList.contains('show');
      
      // Close all others first
      document.querySelectorAll('.select-options').forEach(el => el.classList.remove('show'));
      
      if (!isCurrentlyShowing) {
        options.classList.add('show');
      }
    }

    function selectOption(triggerId, optionsId, value) {
      const trigger = document.getElementById(triggerId);
      trigger.innerHTML = `<span style="color:#fff; font-weight:600;">${value}</span> <i class="fa-solid fa-chevron-down"></i>`;
      trigger.dataset.value = value;
      document.getElementById(optionsId).classList.remove('show');
    }

    // Close dropdowns if the user clicks outside of them
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.custom-select')) {
        document.querySelectorAll('.select-options').forEach(el => el.classList.remove('show'));
      }
    });

    // 7. BACKEND SUBMISSION ENGINE
    const SUPABASE_URL = "https://dimvxstsftyalllwtpoy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbXZ4c3RzZnR5YWxsbHd0cG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjc4NDAsImV4cCI6MjA5NDgwMzg0MH0.aTUrMN6n4I68eUSEsWMeyLwnIgslYSlrq9JOKVXAPT0";
    const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9XBlM0d2toRcFt09DbK-OJLLmeVuPGU9j8N3PAEIxEYw9QkCx7YCGah7MoLyKxjY/exec"; 

    // Find out who is logged in
    let loggedInUser = null;
    window.addEventListener('load', async function() {
      if (supabaseClient) {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) { loggedInUser = user; }
      }
    });

    async function submitAbsence() {
      // Pull data from the form
      const name = document.getElementById('clientName').value;
      const whoValue = document.getElementById('whoTrigger').dataset.value;
      const serviceValue = document.getElementById('serviceTrigger').dataset.value;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const reason = document.getElementById('reasonText').value;

      // Validation
      if (!name) return alert("Please enter your name.");
      if (!whoValue) return alert("Please select who is absent.");
      if (!serviceValue) return alert("Please select the service type.");
      if (!startDate || !endDate) return alert("Please select both start and end dates.");

      const btn = document.getElementById('submitBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
      btn.disabled = true;

      // Package payload to send to Google Sheets
      const payload = {
        actionType: 'mark_absent',
        email: loggedInUser ? loggedInUser.email : 'Guest / Not Logged In',
        name: name,
        serviceType: serviceValue,
        date: `From: ${startDate} To: ${endDate}`,
        address: 'N/A', // Not needed for this form
        details: `Absent Entity: ${whoValue} | Reason: ${reason || 'None provided'}`
      };

      try {
        await fetch(GOOGLE_SCRIPT_URL, { 
          method: 'POST', 
          mode: 'no-cors', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify(payload) 
        });
        
        btn.innerHTML = '<span style="color:white;"><i class="fa-solid fa-check"></i> Request Sent!</span>';
        alert("Absence request submitted successfully! Our backend team has been notified.");
        
        // Reset page after 2 seconds
        setTimeout(() => { window.location.reload(); }, 2000);
      } catch (err) {
        alert("Error connecting to server. Please try again.");
        btn.innerHTML = 'Send Request';
        btn.disabled = false;
      }
    }
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
