<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Dashboard | Priya Seva</title>
  
  <meta name="theme-color" content="#050a15">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #050a15; color: white; min-height: 100vh; position: relative;}
    
    /* Background Elements */
    .bg-gradient { position: fixed; inset: 0; background: linear-gradient(135deg, rgba(5, 10, 20, 1) 0%, rgba(15, 30, 60, 1) 100%); z-index: -2; }
    .galactic-doodles { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20l2-5 2 5 5 2-5 2-2 5-2-5-5-2 5-2zm40 40l1-3 1 3 3 1-3 1-1 3-1-3-3-1 3-1zm15-50a10 10 0 1 1 10 10 8 8 0 0 0-10-10z' fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E"); z-index: -1; pointer-events: none; }

    /* Glass Navbar */
    header { position: absolute; top: 0; left: 0; width: 100%; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);}
    .brand { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
    .logout-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 18px; border-radius: 8px; cursor: pointer; font-family: 'Poppins'; font-weight: 600; font-size: 13px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
    .logout-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    
    /* Layout */
    .dashboard-container { max-width: 1200px; margin: 120px auto 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 360px; gap: 30px; position: relative; z-index: 10;}
    @media (max-width: 900px) { .dashboard-container { grid-template-columns: 1fr; } }
    .main-panel { display: flex; flex-direction: column; gap: 25px; }

    /* Reusable Glass Panel Class */
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); padding: 30px; }
    
    /* Welcome Banner */
    .welcome-banner { display: flex; justify-content: space-between; align-items: center; padding: 25px 30px; border-left: 4px solid #3498db;}
    .welcome-text h2 { margin: 0 0 5px 0; color: #fff; font-size: 22px; font-weight: 700; letter-spacing: 0.5px;}
