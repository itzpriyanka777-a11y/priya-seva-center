<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Us | Priya Seva</title>
  
  <meta name="theme-color" content="#03040b">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* SCROLLBAR NUKE - Hides scrollbars on all browsers but keeps scrolling active */
    ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
    * { scrollbar-width: none !important; -ms-overflow-style: none !important; }

    :root {
      --void-bg: #03040b;
      --glass-base: rgba(10, 15, 25, 0.25);
      --glass-border: rgba(255, 255, 255, 0.08);
      --highlight: #00f3ff; 
      --deep-ocean: #0055ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* THE SCORCHED-EARTH GOOGLE TRANSLATE NUKE */
    html { top: 0px !important; margin-top: 0px !important; padding-top: 0px !important; }
    body { top: 0px !important; margin-top: 0px !important; position: static !important; }
    .skiptranslate, iframe.goog-te-banner-frame, .VIpgJd-Zvi9od-aZ2wEe-wOHMyf, .VIpgJd-Zvi9od-ORHb-OEVmcd, #goog-gt-tt, .goog-te-balloon-frame { display: none !important; width: 0 !important; height: 0 !important; visibility: hidden !important; }
    .goog-text-highlight { background: none !important; box-shadow: none !important; border: none !important;}

    /* ANTI-FLASH FADE */
    body { 
      opacity: 0; 
      animation: smoothLoad 0.8s ease-in 0.6s forwards; 
      font-family: 'Poppins', sans-serif; 
      background-color: var(--void-bg); 
      overflow: hidden; 
      color: white; 
    }
    @keyframes smoothLoad { to { opacity: 1; } }

    #nightCanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
    #rippleContainer { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .water-ripple { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 25px rgba(0, 243, 255, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1); animation: rippleEffect 1.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; pointer-events: none; transform: translate(-50%, -50%); }
    @keyframes rippleEffect { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 300px; height: 300px; opacity: 0; border-width: 0px; } }

    /* UNIVERSAL HEADER */
    .universal-header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10000; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5, 5, 16, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-sizing: border-box;}
    .universal-brand { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2); transition: 0.3s;}
    .universal-brand:hover { transform: scale(1.05); color: #00f3ff; }
    .universal-nav-right { display: flex; gap: 15px; align-items: center;}
    .universal-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Poppins'; font-weight: 600; font-size: 13px; transition: 0.3s; text-decoration: none; display: flex; align-items: center; gap: 8px;}
    .universal-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3);}

    /* LANGUAGE DROPDOWN CSS */
    .menu-container { position: relative; display: inline-block; }
    .menu-btn { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 15px; font-size: 16px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; backdrop-filter: blur(10px);}
    .menu-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: white;}
    .dropdown-content { display: none; position: absolute; right: 0; top: 110%; background: rgba(5, 10, 20, 0.95); backdrop-filter: blur(20px); min-width: 150px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid var(--glass-border); overflow: hidden; z-index: 99;}
    .dropdown-content a { color: #e2e8f0; padding: 16px 22px; display: block; font-weight: 500; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; text-decoration: none;}
    .dropdown-content a:hover { background: rgba(0, 243, 255, 0.1); color: white; padding-left: 28px;}
    .menu-container:hover .dropdown-content { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
       .universal-header { padding: 15px 20px; }
       .universal-brand span { display: none; } 
       .universal-btn { padding: 8px 12px; font-size: 12px; }
       .universal-btn span { display: none; } 
    }

    .split-layout { display: flex; height: 100vh; width: 100vw; position: relative; z-index: 10; }
    .left-pane { flex: 1.15; position: relative; display: flex; align-items: center; justify-content: center; padding: 100px 40px 20px 40px; box-sizing: border-box; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;}
    .left-pane::-webkit-scrollbar { width: 0px; }
    .form-container { position: relative; width: 100%; max-width: 500px; max-height: 85vh; padding-right: 15px;}
    
    .spatial-header { text-align: center; margin-bottom: 50px; animation: floatLiquid 6s ease-in-out infinite; z-index: 100;}
    .spatial-header h2 { margin: 0 0 10px 0; font-size: 40px; font-weight: 700; color: #fff; letter-spacing: 1px; text-shadow: 0 5px 25px rgba(0, 243, 255, 0.8), 0 0 50px rgba(0,0,0,1);}
    .spatial-header p { margin: 0 auto; font-size: 14px; color: #fff; font-weight: 500; max-width: 400px; line-height: 1.6; text-shadow: 0 2px 5px rgba(0,0,0,1);}

    .capsule-group { width: 100%; margin-bottom: 25px; position: relative; animation: floatLiquid 7s ease-in-out infinite alternate; }
    .capsule-group:nth-child(2) { animation-delay: 1s; z-index: 50; }
    .capsule-group:nth-child(3) { animation-delay: 2s; z-index: 40; }
    .capsule-group:nth-child(4) { animation-delay: 0.5s; z-index: 30; }
    .capsule-group:nth-child(5) { animation-delay: 1.5s; z-index: 20; }
    .capsule-group:nth-child(6) { animation-delay: 0.8s; z-index: 10; }

    @keyframes floatLiquid { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

    .light-tracker { position: relative; width: 100%; }
    .light-tracker::after { content: ''; position: absolute; inset: 0px; border-radius: inherit; padding: 1.5px; background: radial-gradient(circle 120px at var(--mouse-x, -500px) var(--mouse-y, -500px), rgba(0, 255, 255, 1), rgba(160, 100, 255, 0.8) 40%, transparent 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 10; }
    .light-tracker::before { content: ''; position: absolute; inset: 0; border-radius: inherit; background: radial-gradient(circle 180px at var(--mouse-x, -500px) var(--mouse-y, -500px), rgba(0, 243, 255, 0.15), transparent 100%); pointer-events: none; z-index: 0; }

    .input-group label { display: block; font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 2px 5px rgba(0,0,0,1); display: flex; justify-content: space-between;}
    .input-group label span.optional { color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 0;}
    
    .glass-render { width: 100%; padding: 18px 25px; background: var(--glass-base); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: inherit; color: #ffffff; font-family: 'Poppins'; font-size: 15px; font-weight: 600; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); outline: none; box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255, 255, 255, 0.1); position: relative; z-index: 1; text-shadow: 0 2px 5px rgba(0,0,0,1); }
    .glass-render::placeholder { color: rgba(255,255,255,0.4); text-transform: uppercase; font-size: 12px; letter-spacing: 1px;}
    .glass-render:hover { background: rgba(10, 15, 25, 0.6); transform: scale(1.02); }
    .glass-render:focus { transform: scale(1.04); background: rgba(0, 243, 255, 0.1); box-shadow: 0 15px 40px rgba(0, 243, 255, 0.3), inset 0 2px 10px rgba(0, 243, 255, 0.3); }

    /* CUSTOM FILE INPUT STYLING */
    input[type="file"].glass-render { padding: 12px 20px; font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 500;}
    input[type="file"]::file-selector-button { background: var(--highlight); color: black; border: none; padding: 10px 18px; border-radius: 8px; font-family: 'Poppins'; font-weight: 600; cursor: pointer; margin-right: 15px; transition: 0.3s; }
    input[type="file"]::file-selector-button:hover { box-shadow: 0 0 15px rgba(0,243,255,0.5); transform: translateY(-2px); }

    .custom-select { position: relative; user-select: none; }
    .select-trigger { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .select-trigger span { text-transform: uppercase; font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.7); }
    .select-trigger.active span { color: white; font-size: 15px; text-transform: none; letter-spacing: 0; }
    
    .select-options { position: absolute; top: 110%; left: 0; right: 0; background: rgba(5, 8, 15, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); border-radius: inherit; overflow: hidden; display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.9);}
    .select-options.show { display: block; animation: dropBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .option { padding: 16px 25px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); text-shadow: 0 2px 5px rgba(0,0,0,0.9); position: relative; z-index: 1;}
    .option:last-child { border-bottom: none; }
    .option:hover { background: rgba(0, 243, 255, 0.2); padding-left: 35px; }

    .submit-btn { width: 100%; padding: 22px; background: rgba(0, 243, 255, 0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: inherit; color: var(--highlight); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); text-shadow: 0 2px 5px rgba(0,0,0,0.9); position: relative; z-index: 1;}
    .submit-btn:hover { transform: translateY(-5px) scale(1.03); background: rgba(0, 243, 255, 0.25); color: #fff; box-shadow: 0 25px 50px rgba(0, 243, 255, 0.4); text-shadow: 0 0 10px #fff; }
    
    @keyframes dropBounce { 0% { opacity: 0; transform: translateY(-20px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

    .right-pane { flex: 0.85; position: relative; background: transparent; overflow: hidden; pointer-events: none; -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 40%); mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,1) 40%); }
    .video-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translateX(-50%) translateY(-50%); opacity: 0; object-fit: cover; z-index: 1; transition: opacity 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .video-bg.playing { opacity: 0.85; }

    /* MOBILE REVOLUTION CSS */
    @media (max-width: 900px) {
      body { overflow: auto; }
      .split-layout { flex-direction: column; overflow-y: visible; height: auto; display: block;}
      .left-pane { padding: 100px 20px 40px 20px; min-height: auto; display: block; overflow-y: visible;}
      .right-pane { display: none !important; } 
    }
  </style>
</head>
<body>

  <!-- HIDDEN GOOGLE TRANSLATE ELEMENT -->
  <div id="google_translate_element" style="display:none; width:0; height:0; position:absolute;"></div>

  <!-- UNIVERSAL HEADER -->
  <header class="universal-header">
    <a href="index.html" class="universal-brand">
      <i class="fa-solid fa-handshake-angle" style="color: #00f3ff;"></i> <span>Priya Seva Jobs</span>
    </a>
    <div class="universal-nav-right">
      <a href="index.html" class="universal-btn"><i class="fa-solid fa-house"></i> <span>Home</span></a>
      
      <!-- LANGUAGE TRANSLATION MENU -->
      <div class="menu-container">
        <button class="menu-btn" title="Change Language"><i class="fa-solid fa-globe"></i></button>
        <div class="dropdown-content">
          <a href="#" onclick="changeLanguage('en'); return false;">English</a>
          <a href="#" onclick="changeLanguage('hi'); return false;">हिन्दी (Hindi)</a>
          <a href="#" onclick="changeLanguage('bn'); return false;">বাংলা (Bengali)</a>
        </div>
      </div>
      
    </div>
  </header>

  <canvas id="nightCanvas"></canvas>
  <div id="rippleContainer"></div>

  <div class="split-layout">
    <div class="left-pane">
      <div class="form-container" id="mainForm">
        
        <div class="spatial-header">
          <h2>Join Our Team</h2>
          <p>Join our team at Priya Seva. Send your details below so we can hire you quickly.</p>
        </div>

        <div class="capsule-group input-group">
          <label>Your Full Name</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="text" id="appName" class="glass-render" placeholder="As per Govt ID" required>
          </div>
        </div>

        <div style="display:flex; gap:15px;">
          <div class="capsule-group input-group" style="flex:1;">
            <label>Phone Number</label>
            <div class="light-tracker" style="border-radius: 50px;">
              <input type="tel" id="appPhone" class="glass-render" placeholder="10-digit mobile" required>
            </div>
          </div>
          <div class="capsule-group input-group" style="flex:1;">
            <label>Email Address <span class="optional">(Optional)</span></label>
            <div class="light-tracker" style="border-radius: 50px;">
              <input type="email" id="appEmail" class="glass-render" placeholder="email@address.com">
            </div>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Your Home Address</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="text" id="appAddress" class="glass-render" placeholder="Current address & Pincode" required>
          </div>
        </div>

        <div class="capsule-group input-group custom-select">
          <label>Job You Want</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <div class="glass-render select-trigger" id="roleTrigger" onclick="toggleDropdown('roleOptions')">
              <span>Choose Job</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
          </div>
          <div class="light-tracker select-options" id="roleOptions" style="border-radius: 25px;">
            <div class="option" onclick="selectOption('roleTrigger', 'roleOptions', 'Maid')">Maid</div>
            <div class="option" onclick="selectOption('roleTrigger', 'roleOptions', 'Expert Nurse')">Expert Nurse</div>
            <div class="option" onclick="selectOption('roleTrigger', 'roleOptions', 'Health Check-up Staff')">Health Check-up Staff</div>
            <div class="option" onclick="selectOption('roleTrigger', 'roleOptions', 'Babysitter')">Babysitter</div>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Past Work Experience</label>
          <div class="light-tracker" style="border-radius: 25px;">
            <textarea id="appExperience" class="glass-render" placeholder="Tell us about your past work..." style="resize:vertical; min-height:100px; border-radius: 25px;"></textarea>
          </div>
        </div>

        <div class="capsule-group input-group custom-select">
          <label>ID Proof</label>
          <div class="light-tracker" style="border-radius: 50px;">
            <div class="glass-render select-trigger" id="idTrigger" onclick="toggleDropdown('idOptions')">
              <span>Choose ID</span> <i class="fa-solid fa-chevron-down"></i>
            </div>
          </div>
          <div class="light-tracker select-options" id="idOptions" style="border-radius: 25px;">
            <div class="option" onclick="selectOption('idTrigger', 'idOptions', 'Aadhaar Card')">Aadhaar Card</div>
            <div class="option" onclick="selectOption('idTrigger', 'idOptions', 'PAN Card')">PAN Card</div>
            <div class="option" onclick="selectOption('idTrigger', 'idOptions', 'Voter ID DL')">Voter ID DL</div>
            <div class="option" onclick="selectOption('idTrigger', 'idOptions', 'Visa / Passport')">Visa / Passport</div>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Upload ID Photo <span class="optional">(Required)</span></label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="file" id="idFile" class="glass-render" accept="image/*,.pdf" required>
          </div>
        </div>

        <div class="capsule-group input-group">
          <label>Upload Resume <span class="optional">(Optional)</span></label>
          <div class="light-tracker" style="border-radius: 50px;">
            <input type="file" id="resumeFile" class="glass-render" accept=".pdf,.doc,.docx">
          </div>
        </div>

        <div class="capsule-group" style="margin-top: 35px;">
          <div class="light-tracker" style="border-radius: 50px;">
            <button onclick="submitApplication()" class="submit-btn" id="submitBtn">Send Application</button>
          </div>
        </div>

      </div>
    </div>

    <div class="right-pane">
      <video autoplay loop muted playsinline class="video-bg" id="cinematicVideo" onplaying="this.classList.add('playing')">
        <source src="https://cdn.coverr.co/videos/coverr-business-meeting-2559/1080p.mp4" type="video/mp4">
      </video>
    </div>

  </div>

  <script>
    const rippleContainer = document.getElementById('rippleContainer');
    function createRipple(x, y) {
      const ripple = document.createElement('div'); ripple.className = 'water-ripple'; ripple.style.left = x + 'px'; ripple.style.top = y + 'px';
      rippleContainer.appendChild(ripple); setTimeout(() => { ripple.remove(); }, 1800);
    }
    document.addEventListener('click', (e) => createRipple(e.clientX, e.clientY));
    
    // UI LAG FIX: requestAnimationFrame throttle added to heavy mousemove event
    let lastRippleTime = 0;
    let isTicking = false;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if(now - lastRippleTime > 150) { createRipple(e.clientX, e.clientY); lastRippleTime = now; }
      
      if (!isTicking) {
        window.requestAnimationFrame(() => {
          document.querySelectorAll('.light-tracker').forEach(el => {
            const rect = el.getBoundingClientRect(); 
            el.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`); 
            el.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
          });
          isTicking = false;
        });
        isTicking = true;
      }
    });

    const canvas = document.getElementById('nightCanvas'); const ctx = canvas.getContext('2d');
    let stars = []; let clouds = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    for(let i=0; i<400; i++) { stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 1.5, speed: (Math.random() * 0.12) + 0.04, twinklePhase: Math.random() * Math.PI * 2, twinkleSpeed: (Math.random() * 0.02) + 0.01, color: Math.random() > 0.85 ? '0, 243, 255' : '255, 255, 255' }); }
    for(let i=0; i<8; i++) {
      let baseSize = (Math.random() * 180) + 120; let subParts = []; let cloudCircles = Math.floor(Math.random() * 3) + 4; 
      for(let j=0; j<cloudCircles; j++) { subParts.push({ offsetX: (Math.random() - 0.5) * baseSize * 1.2, offsetY: (Math.random() - 0.5) * baseSize * 0.4, radius: (Math.random() * 0.4 + 0.6) * (baseSize * 0.5) }); }
      clouds.push({ x: Math.random() * canvas.width, y: (Math.random() * canvas.height * 0.85), parts: subParts, baseSize: baseSize, speed: (Math.random() * 0.25) + 0.12, opacity: (Math.random() * 0.14) + 0.04 });
    }

    function drawSereneSky() {
      ctx.fillStyle = '#03040b'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => { s.x -= s.speed; if(s.x < 0) { s.x = canvas.width; s.y = Math.random() * canvas.height; } s.twinklePhase += s.twinkleSpeed; let opacity = Math.abs(Math.sin(s.twinklePhase)) * 0.8 + 0.2; ctx.fillStyle = `rgba(${s.color}, ${opacity})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); });
      clouds.forEach(c => {
        c.x += c.speed; if(c.x > canvas.width + c.baseSize * 2) { c.x = -c.baseSize * 2; c.y = (Math.random() * canvas.height * 0.85); }
        ctx.save(); ctx.shadowColor = 'rgba(2, 6, 20, 0.95)'; ctx.shadowBlur = c.baseSize * 0.6; ctx.fillStyle = `rgba(5, 14, 32, ${c.opacity})`;
        ctx.beginPath(); c.parts.forEach(p => { ctx.arc(c.x + p.offsetX, c.y + p.offsetY, p.radius, 0, Math.PI * 2); }); ctx.fill(); ctx.restore();
      });
      requestAnimationFrame(drawSereneSky);
    }
    drawSereneSky();

    function toggleDropdown(id) { document.querySelectorAll('.select-options').forEach(el => { if(el.id !== id) el.classList.remove('show'); }); document.getElementById(id).classList.toggle('show'); }
    function selectOption(triggerId, dropdownId, value) { const trigger = document.getElementById(triggerId); trigger.innerHTML = `<span>${value}</span> <i class="fa-solid fa-chevron-down"></i>`; trigger.classList.add('active'); document.getElementById(dropdownId).classList.remove('show'); }
    
    document.addEventListener('click', function(e) {
      if(!e.target.closest('.custom-select')) { document.querySelectorAll('.select-options').forEach(el => el.classList.remove('show')); }
    });

    async function submitApplication() {
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('appName').value;
      const email = document.getElementById('appEmail').value || "Not Provided";
      const phone = document.getElementById('appPhone').value;
      const address = document.getElementById('appAddress').value;
      const role = document.getElementById('roleTrigger').innerText.trim();
      const experience = document.getElementById('appExperience').value;
      const idType = document.getElementById('idTrigger').innerText.trim();
      const idFile = document.getElementById('idFile').files.length;

      if(!name || !phone || !address || !experience || role.includes("Choose") || idType.includes("Select") || idFile === 0) { 
        return alert("Please fill in all required fields and select an ID document to upload."); 
      }
      
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Getting ready...'; 
      btn.disabled = true;

      // Formatting Mailto link

  <!-- THE MASTER LANGUAGE ENGINE (Fix 1) -->
  <script type="text/javascript">
    // 1. Force the language immediately to stop the choppy English flash
    let savedLang = localStorage.getItem('priyaSevaLang') || 'bn';
    document.cookie = `googtrans=/en/${savedLang}; path=/; domain=${window.location.hostname}`;
    document.cookie = `googtrans=/en/${savedLang}; path=/`;

    // 2. Initialize Google Translate Invisibly
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'en,hi,bn', autoDisplay: false }, 'google_translate_element');
    }

    // 3. The Global Switcher (Fixes the stuck Main Page!)
    function changeLanguage(langCode) {
      localStorage.setItem('priyaSevaLang', langCode); // Saves to Global Memory
      localStorage.setItem('langChoiceMade', 'true');  // Tells the popup you already chose
      document.cookie = `googtrans=/en/${langCode}; path=/; domain=${window.location.hostname}`;
      document.cookie = `googtrans=/en/${langCode}; path=/`;
      window.location.reload(); // Reloads instantly in the correct language
    }

    // 4. Popup & Loading Mask Controller (For index.html)
    window.addEventListener('DOMContentLoaded', () => {
      const mask = document.getElementById('contentMask');
      const popup = document.getElementById('langPopupOverlay');
      const choiceMade = localStorage.getItem('langChoiceMade');

      if (mask && popup) {
        if (!choiceMade) {
          // First time visitor: Show mask for 1s, then show Popup
          setTimeout(() => {
            mask.style.opacity = '0';
            setTimeout(() => { mask.style.display = 'none'; popup.style.display = 'flex'; }, 800);
          }, 1000);
        } else {
          // Returning visitor: Just hide the mask smoothly
          setTimeout(() => {
            mask.style.opacity = '0';
            setTimeout(() => { mask.style.display = 'none'; }, 800);
          }, 800);
        }
      }
      
      // Nuke the ugly Google Translate Bar permanently
      const observer = new MutationObserver(() => {
          document.body.style.top = '0px';
          document.documentElement.style.top = '0px';
          const gtFrame = document.querySelector('.goog-te-banner-frame');
          if(gtFrame) gtFrame.remove();
      });
      observer.observe(document.body, { attributes: true, attributeFilter: ['style'] });
    });
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
